      &lt;div class=&quot;rpr-stat&quot;&gt;&lt;span class=&quot;num&quot;&gt;42&lt;/span&gt;&lt;span class=&quot;label&quot;&gt;报告前工作树状态项&lt;/span&gt;&lt;span class=&quot;note&quot;&gt;当前版本不可直接复现&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;executive&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;01 · 执行摘要&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;EXECUTIVE SUMMARY&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-verdict&quot;&gt;
        &lt;div class=&quot;rpr-verdict-main&quot;&gt;
          &lt;h3&gt;结论：强功能原型，尚非可直接联网的生产系统&lt;/h3&gt;
          &lt;p&gt;项目已建立真实、完整的“档案抽取 → 数据归一 → GIS 查询 → 地图展示 → 巡查闭环 → 图斑冲突 → AI 增强 → 本地运维”骨架。地图、文物详情、媒体、两线、行政下钻和 SQLite/R-Tree/FTS 基础扎实，适合单机演示与隔离环境试用。&lt;/p&gt;
          &lt;p&gt;阻碍生产化的核心不在功能数量，而在安全默认值、权限边界、巡查与统计契约、数据库重建、资源上限、隐私外发治理和测试深度。P0/P1 未关闭前，不建议在非隔离网络运行或继续接入敏感巡查资料。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-verdict-side&quot;&gt;
          &lt;div class=&quot;rpr-grade&quot;&gt;&lt;strong&gt;产品闭环&lt;/strong&gt;&lt;span&gt;&lt;span class=&quot;rpr-badge ok&quot;&gt;已形成&lt;/span&gt; 主要业务链均有实现&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-grade&quot;&gt;&lt;strong&gt;数据基础&lt;/strong&gt;&lt;span&gt;&lt;span class=&quot;rpr-badge ok&quot;&gt;较扎实&lt;/span&gt; 1,108 条真实台账与空间索引&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-grade&quot;&gt;&lt;strong&gt;指标可信度&lt;/strong&gt;&lt;span&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;待校正&lt;/span&gt; 年代、健康度、筛选口径有偏差&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-grade&quot;&gt;&lt;strong&gt;巡查能力&lt;/strong&gt;&lt;span&gt;&lt;span class=&quot;rpr-badge wip&quot;&gt;试运行&lt;/span&gt; 链路完整但契约与证据断链&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-grade&quot;&gt;&lt;strong&gt;安全上线&lt;/strong&gt;&lt;span&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;不通过&lt;/span&gt; 当前配置存在可利用风险链&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-grade&quot;&gt;&lt;strong&gt;工程保障&lt;/strong&gt;&lt;span&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;基础级&lt;/span&gt; 后端测试通过，前端/E2E/运维不足&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-three&quot; style=&quot;margin-top:18px&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;最值得保留&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;本地优先、单包部署，业务人员上手成本低。&lt;/li&gt;
            &lt;li&gt;数据管线有断点、账本、原子写和标准边界校验。&lt;/li&gt;
            &lt;li&gt;SQLite R-Tree + FTS5 与 Cesium 视口查询方向正确。&lt;/li&gt;
            &lt;li&gt;文物、巡查、图斑、AI、离线瓦片形成领域闭环。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;最先修复&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;认证默认关闭和管理面全开。&lt;/li&gt;
            &lt;li&gt;AI base URL 可把现有凭据发送到任意主机。&lt;/li&gt;
            &lt;li&gt;瓦片全世界高层级枚举可单请求耗尽内存。&lt;/li&gt;
            &lt;li&gt;上传、公开 TTS、巡查 token 缺配额和生命周期。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;最需澄清&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;“数据不出本机”与实际外部 AI/地图调用矛盾。&lt;/li&gt;
            &lt;li&gt;统计与健康度应定义正式业务口径和责任人。&lt;/li&gt;
            &lt;li&gt;产品边界究竟是隔离单机、可信局域网还是公网。&lt;/li&gt;
            &lt;li&gt;图斑面积与巡查证据能否用于法定结论。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;scope&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;02 · 调研范围、方法与边界&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;SCOPE&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-two&quot;&gt;
        &lt;div&gt;
          &lt;h3&gt;已覆盖&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;全部受版本控制的源码、测试、配置模板、构建脚本和文档。&lt;/li&gt;
            &lt;li&gt;当前未跟踪/未提交的新功能源码及相关差异。&lt;/li&gt;
            &lt;li&gt;主库和巡查库结构、完整性、聚合统计与数据一致性。&lt;/li&gt;
            &lt;li&gt;约 18 GB 业务数据的目录、类型、数量、体积、清单和日志。&lt;/li&gt;
            &lt;li&gt;前后端契约、认证、上传、瓦片、AI、TTS、边界、巡查和图斑路径。&lt;/li&gt;
            &lt;li&gt;测试、类型检查、依赖完整性和 npm 漏洞审计。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div&gt;
          &lt;h3&gt;口径限制&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;约 31,000 行文本/配置/源码进入静态审阅；生成物和第三方依赖未逐行审查。&lt;/li&gt;
            &lt;li&gt;8.3 GB DOCX 与大量照片/图纸按元数据、抽样与清单审阅，未逐份阅读或逐图判断内容。&lt;/li&gt;
            &lt;li&gt;服务在调研时未运行；运行结论由代码、配置、历史日志、数据库和既有构建产物交叉验证。&lt;/li&gt;
            &lt;li&gt;未执行会改写业务数据的 ETL、清理、导入或正式前端构建。&lt;/li&gt;
            &lt;li&gt;所有密钥均只判断“是否配置”，报告不包含任何敏感值。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rpr-callout amber&quot;&gt;
        &lt;strong&gt;版本口径：&lt;/strong&gt;报告基于当前磁盘快照，而非单纯的 HEAD。生成报告前工作树包含 24 个已跟踪修改、1 个删除和 17 个未跟踪状态项（22 个未跟踪文件）；新行政边界、数字名片/TTS、行政下钻、时间轴、热力图等尚未全部纳入提交。若直接在另一台机器克隆当前提交，无法复现本机现状。
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;product&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;03 · 产品与业务理解&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;PRODUCT&lt;/span&gt;&lt;/div&gt;
      &lt;p&gt;这是面向不可移动文物管理的本地化“一张图”平台，不只是地图展示站。其目标是把分散在 DOCX、Excel、照片、图纸、普查档案、保护范围、行政边界和巡查记录中的信息，汇聚为可检索、可空间分析、可离线运行的业务工作台。&lt;/p&gt;

      &lt;div class=&quot;rpr-three&quot; style=&quot;margin-top:17px&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;地图 / 业务人员&lt;/h3&gt;
          &lt;p&gt;按类别、保护级别、年代、行政区查询；下钻县镇村；查看详情、图片、图纸、两线、PDF 与 3D；使用热力图、健康图和坐标转换。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;巡查管理与外业&lt;/h3&gt;
          &lt;p&gt;查看到期清单，规划路线并生成二维码；外业人员通过免登录 H5 上传照片和 GPS；管理端聚合记录、生成报告并可触发 AI 评估。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;数据 / 系统管理员&lt;/h3&gt;
          &lt;p&gt;配置模型与地图服务，运行或停止管线，下载/恢复边界，导入图斑，预下载瓦片，查看任务日志、缓存和资源状态。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rpr-two&quot; style=&quot;margin-top:14px&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;匿名公众&lt;/h3&gt;
          &lt;p&gt;数字名片、文物照片与语音讲解存在公开入口；持路线 token 的外业 H5 也不要求登录。当前公开字段包含详细地址、保存状况、简介和图片，需做数据分级。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;权限现实&lt;/h3&gt;
          &lt;p&gt;代码没有真正 RBAC。上述角色仅是业务推断；一旦登录，用户权限相同。当前实际配置甚至关闭认证，使所有角色边界在服务层失效。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;architecture&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;04 · 系统架构与数据流&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;ARCHITECTURE&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-callout green&quot;&gt;&lt;strong&gt;架构定位：&lt;/strong&gt;本地优先的模块化单体。一个 Uvicorn/FastAPI 进程同时提供 REST/SSE API、React 静态资源、媒体、移动巡查 H5 和地图瓦片代理；主数据在 SQLite，二进制资产在文件系统。&lt;/div&gt;

      &lt;div class=&quot;rpr-flow&quot; aria-label=&quot;系统主数据流&quot;&gt;
        &lt;div class=&quot;rpr-flow-node&quot;&gt;
          &lt;strong&gt;① 原始资料&lt;/strong&gt;
          &lt;span&gt;DOCX / Excel / 名录&lt;/span&gt;
          &lt;span&gt;照片 / 图纸 / PDF / 3D&lt;/span&gt;
          &lt;span&gt;SHP / GeoJSON / 行政边界&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;rpr-flow-node&quot; style=&quot;border-top-color:#7657c9&quot;&gt;
          &lt;strong&gt;② 四步 ETL&lt;/strong&gt;
          &lt;span&gt;00 文档 AI 结构化&lt;/span&gt;
          &lt;span&gt;01 归一、媒体、两线&lt;/span&gt;
          &lt;span&gt;02 边界转 WGS84&lt;/span&gt;
          &lt;span&gt;03 构建 SQLite&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;rpr-flow-node&quot; style=&quot;border-top-color:#1f8a63&quot;&gt;
          &lt;strong&gt;③ 本地存储&lt;/strong&gt;
          &lt;span&gt;relics.db：R-Tree / FTS5&lt;/span&gt;
          &lt;span&gt;patrol.db：路线与打卡&lt;/span&gt;
          &lt;span&gt;照片 / 图纸 / 边界 / 瓦片&lt;/span&gt;
          &lt;span&gt;图斑：JSON + GeoJSON&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;rpr-flow-node&quot; style=&quot;border-top-color:#c67a16&quot;&gt;
          &lt;strong&gt;④ 应用层&lt;/strong&gt;
          &lt;span&gt;FastAPI 路由与服务&lt;/span&gt;
          &lt;span&gt;React / Zustand 工作台&lt;/span&gt;
          &lt;span&gt;Cesium Scene2D 地图&lt;/span&gt;
          &lt;span&gt;Three.js 独立 3D 查看器&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-external&quot;&gt;
        &lt;strong&gt;可选外部服务&lt;/strong&gt;
        &lt;span&gt;SiliconFlow / DeepSeek（文档抽取、聊天、视觉、TTS） · 高德（地理编码/驾车路线） · 天地图/ArcGIS/Gaode/OSM（底图） · Open-Meteo（天气） · DataV/Overpass（在线行政边界）。因此“本地优先”不等于“数据绝不外发”。&lt;/span&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;运行时关键路径&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;路径&lt;/th&gt;&lt;th&gt;真实实现&lt;/th&gt;&lt;th&gt;架构评价&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;服务启动&lt;/td&gt;&lt;td&gt;加载 YAML → 主库/JSON → 标准边界恢复 → AI/巡查/问答初始化 → 挂载前端与静态文件。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge ok&quot;&gt;简单可部署&lt;/span&gt; 但单进程、全局状态，不适合多 worker 或横向扩展。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;地图查询&lt;/td&gt;&lt;td&gt;后端把全库装入内存，前端又拉 deprecated 全量摘要；地图点位另走 R-Tree bbox 查询。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;三套机制并存&lt;/span&gt; R-Tree 有效，但未消除服务端和浏览器全量常驻。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;主地图 / 3D&lt;/td&gt;&lt;td&gt;主地图固定 Cesium &lt;code&gt;SceneMode.SCENE2D&lt;/code&gt;；3D Tiles 由 Three.js 独立页面渲染。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge info&quot;&gt;功能分离&lt;/span&gt; 与文档“同一 Cesium 引擎覆盖 2.5D/3D”不符。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;巡查&lt;/td&gt;&lt;td&gt;路线和打卡写独立 patrol.db；到期计算读取它，健康图却只读主记录字段。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;数据断链&lt;/span&gt; 真实打卡无法更新健康图。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;AI 问答&lt;/td&gt;&lt;td&gt;每次请求发送约 45,620 个中文字符的全量台账上下文，再附加 top-k 详情。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;成本与隐私瓶颈&lt;/span&gt; top-k 尚未替代全量 prompt。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
      &lt;p class=&quot;rpr-evidence&quot;&gt;主要证据：&lt;code&gt;platform/webgis/main.py:59-123,246-259,327-399&lt;/code&gt;；&lt;code&gt;platform/webgis/data_loader.py:47-233&lt;/code&gt;；&lt;code&gt;platform/webgis-react/src/map/useCesiumViewer.ts:52-70&lt;/code&gt;；&lt;code&gt;platform/webgis/routers/chat.py:110-164,263-309&lt;/code&gt;。&lt;/p&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;repository&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;05 · 仓库结构、技术栈与启动方式&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;REPOSITORY&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-two&quot;&gt;
        &lt;div&gt;
          &lt;h3&gt;主要目录&lt;/h3&gt;
          &lt;div class=&quot;rpr-table-wrap&quot;&gt;
            &lt;table class=&quot;rpr-tight&quot;&gt;
              &lt;thead&gt;&lt;tr&gt;&lt;th&gt;目录 / 文件&lt;/th&gt;&lt;th&gt;职责&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
              &lt;tbody&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;platform/scripts/&lt;/code&gt;&lt;/td&gt;&lt;td&gt;DOCX 抽取、归一、边界准备、SQLite 建库与统一管线。&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;platform/webgis/&lt;/code&gt;&lt;/td&gt;&lt;td&gt;FastAPI 应用、12 个业务路由、服务、数据仓储与瓦片代理。&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;platform/webgis-react/&lt;/code&gt;&lt;/td&gt;&lt;td&gt;React SPA，含 API、组件、地图层、页面、store、3D 与工具。&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;boundary/standard/&lt;/code&gt;&lt;/td&gt;&lt;td&gt;市/县/镇/村标准边界、manifest 与压缩种子。&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;tests/&lt;/code&gt;&lt;/td&gt;&lt;td&gt;7 个 pytest 文件，覆盖 29 个测试。&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;start.bat&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Windows 环境选择、配置复制、依赖检查、构建和服务启动。&lt;/td&gt;&lt;/tr&gt;
                &lt;tr&gt;&lt;td&gt;&lt;code&gt;docs/presentation/&lt;/code&gt;&lt;/td&gt;&lt;td&gt;静态项目演示页及本地生成的汇报材料。&lt;/td&gt;&lt;/tr&gt;
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
        &lt;/div&gt;

          &lt;h3&gt;代码热点&lt;/h3&gt;
          &lt;div class=&quot;rpr-bars&quot;&gt;
            &lt;div class=&quot;rpr-bar-row&quot;&gt;&lt;span class=&quot;rpr-bar-label&quot;&gt;globals.css&lt;/span&gt;&lt;div class=&quot;rpr-bar-track&quot;&gt;&lt;div class=&quot;rpr-bar-fill&quot; style=&quot;width:100%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;rpr-bar-value&quot;&gt;2,717 行&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;rpr-bar-row&quot;&gt;&lt;span class=&quot;rpr-bar-label&quot;&gt;AdminPage.tsx&lt;/span&gt;&lt;div class=&quot;rpr-bar-track&quot;&gt;&lt;div class=&quot;rpr-bar-fill&quot; style=&quot;width:67%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;rpr-bar-value&quot;&gt;1,809&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;rpr-bar-row&quot;&gt;&lt;span class=&quot;rpr-bar-label&quot;&gt;data_loader.py&lt;/span&gt;&lt;div class=&quot;rpr-bar-track&quot;&gt;&lt;div class=&quot;rpr-bar-fill purple&quot; style=&quot;width:37%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;rpr-bar-value&quot;&gt;≈1,000&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;rpr-bar-row&quot;&gt;&lt;span class=&quot;rpr-bar-label&quot;&gt;BoundaryLayer.ts&lt;/span&gt;&lt;div class=&quot;rpr-bar-track&quot;&gt;&lt;div class=&quot;rpr-bar-fill purple&quot; style=&quot;width:28%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;rpr-bar-value&quot;&gt;751&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;rpr-bar-row&quot;&gt;&lt;span class=&quot;rpr-bar-label&quot;&gt;admin.py&lt;/span&gt;&lt;div class=&quot;rpr-bar-track&quot;&gt;&lt;div class=&quot;rpr-bar-fill amber&quot; style=&quot;width:26%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;rpr-bar-value&quot;&gt;716&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;rpr-bar-row&quot;&gt;&lt;span class=&quot;rpr-bar-label&quot;&gt;patrol.py&lt;/span&gt;&lt;div class=&quot;rpr-bar-track&quot;&gt;&lt;div class=&quot;rpr-bar-fill amber&quot; style=&quot;width:26%&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;rpr-bar-value&quot;&gt;709&lt;/span&gt;&lt;/div&gt;

          &lt;/div&gt;
          &lt;p class=&quot;rpr-evidence&quot;&gt;大文件同时混合 UI、状态、I/O 与业务规则，建议按领域拆分 service / repository / schema / feature，并通过依赖注入提升可测试性。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;技术栈与版本&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;层次&lt;/th&gt;&lt;th&gt;主要技术&lt;/th&gt;&lt;th&gt;现状&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;后端&lt;/td&gt;&lt;td&gt;Python · FastAPI · Uvicorn · Pydantic · httpx · OpenAI SDK&lt;/td&gt;&lt;td&gt;requirements 只有下界，无 lock/hash；README 要求 3.10+，CI 3.11，本机 3.12.10。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;空间 / 数据&lt;/td&gt;&lt;td&gt;SQLite WAL · R-Tree · FTS5 trigram · Shapely · pyshp · CRS 转换&lt;/td&gt;&lt;td&gt;主库完整性通过；标准边界导入还依赖未列入 requirements 的 geopandas/pyogrio/pyproj。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;前端&lt;/td&gt;&lt;td&gt;React 18.3.1 · TypeScript 5.9.3 · Vite 5.4.21 · Zustand 5.0.12&lt;/td&gt;&lt;td&gt;TS strict 开启；package.json 使用宽松 caret，package-lock 锁定 303 个 registry 条目。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;可视化&lt;/td&gt;&lt;td&gt;Cesium 1.140 · ECharts 5.6 · Three 0.169 · PDF.js 4.10&lt;/td&gt;&lt;td&gt;当前 dist 约 16.56 MiB，JS 约 9.53 MiB；登录/名片也静态加载重依赖。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;构建 / CI&lt;/td&gt;&lt;td&gt;start.bat · npm scripts · GitHub Actions Windows&lt;/td&gt;&lt;td&gt;CI 做 pytest、type-check、build；无 lint、覆盖率、E2E、依赖审计、secret scan。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;启动与可复现性&lt;/h3&gt;
      &lt;div class=&quot;rpr-two&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;Windows 主路径&lt;/h3&gt;
          &lt;p&gt;&lt;code&gt;start.bat&lt;/code&gt; 依次选择 &lt;code&gt;.venv&lt;/code&gt;、内置 Python、系统 Python；复制配置；仅探测 yaml/fastapi/uvicorn/httpx；必要时 npm 安装/构建；最后启动 &lt;code&gt;serve.py&lt;/code&gt;。&lt;/p&gt;
          &lt;p&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;缺陷&lt;/span&gt; 若这四个 Python 包存在而 Shapely/Pillow/openpyxl 缺失，启动脚本不会补装；npm 使用 &lt;code&gt;install&lt;/code&gt; 而非 &lt;code&gt;ci&lt;/code&gt;。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;部署现实&lt;/h3&gt;
          &lt;p&gt;单 HTTP 进程、自动打开浏览器、局域网二维码，明显面向 Windows 办公机。没有 TLS/反向代理样例、服务守护、健康探针、备份恢复、迁移框架、发布回滚或容器化部署。&lt;/p&gt;
          &lt;p&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;不可横向扩展&lt;/span&gt; DataStore、任务、缓存、AI 客户端都在进程内，SQLite 与本地文件也不可多机共享。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;functions&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;06 · 功能模块与成熟度&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;FUNCTIONS&lt;/span&gt;&lt;/div&gt;
      &lt;p&gt;成熟度依据“真实代码路径、当前数据、测试/契约和生产风险”判断，不采用缺乏基准的虚构百分制。&lt;/p&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;模块&lt;/th&gt;&lt;th&gt;已实现能力&lt;/th&gt;&lt;th&gt;成熟度判断&lt;/th&gt;&lt;th&gt;主要缺口&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;地图浏览与详情&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;视口加载、过滤、搜索、聚合点、照片/图纸/两线/PDF、天气、热力、时间轴、健康色。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge ok&quot;&gt;较成熟&lt;/span&gt;&lt;/td&gt;&lt;td&gt;全量接口仍常驻；健康指标断链；主地图仅 2D；部分统计/筛选口径不一致。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;行政下钻&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;县→镇→村树、边界显示、标准种子恢复、下载与导出。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge ok&quot;&gt;可用&lt;/span&gt;&lt;/td&gt;&lt;td&gt;6504 村 O(n²) 索引；重复加载大边界；在线替代边界可能被启动种子覆盖。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;数据管线&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;双 AI 通道、断点账本、媒体抽取、名录融合、两线匹配、SQLite 索引。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;功能丰富&lt;/span&gt;&lt;/td&gt;&lt;td&gt;生产库原地 DROP/重建；Step00 后 feature 探测不刷新；坐标/多部件几何存在误判路径。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;资源概览 / 统计&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;数量、类别、级别、行政区、时代、资源完整度与大屏。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;演示可用&lt;/span&gt;&lt;/td&gt;&lt;td&gt;154 条时代遗漏；健康/质量分口径不可靠；零值级别可能错位；指标未版本化。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;巡查&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;到期、自然语言/手选规划、路线 CRUD、二维码、GPS/EXIF 打卡、报告、AI 评估。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge wip&quot;&gt;试运行&lt;/span&gt;&lt;/td&gt;&lt;td&gt;评估响应契约错误；每站状态丢失；token 无过期；证据可伪造；真实打卡不进入健康图。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;图斑冲突&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;SHP/ZIP 导入、CRS 转换、STRtree 点/面冲突、统计和图层。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge wip&quot;&gt;辅助预判&lt;/span&gt;&lt;/td&gt;&lt;td&gt;ZIP bomb；投影粗判；面积近似；跨图层重复计数；结果不随主库版本失效。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;AI 问答&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;SSE 对话、全库上下文、top-k 详情、模型检测。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;可选增强&lt;/span&gt;&lt;/td&gt;&lt;td&gt;全量 prompt、无长度/速率限制、隐私与成本；关闭 AI 时并无文档所称问答规则回退。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;数字名片 / TTS&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;公开名片、二维码、中英文讲解、CosyVoice2 与缓存。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge wip&quot;&gt;新功能 WIP&lt;/span&gt;&lt;/td&gt;&lt;td&gt;文件尚未全部纳入版本；公开字段需分级；TTS 无认证、配额或日预算。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;离线瓦片&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;多源代理、缓存、预缓存、区域估算/下载、历史与清理。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;工具可用&lt;/span&gt;&lt;/td&gt;&lt;td&gt;无 bbox/瓦片数/任务/磁盘上限；高 zoom 单请求可内存 DoS；zoom 17 off-by-one。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;3D / PDF&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;独立 3D Tiles 查看器、测距；PDF.js 阅读器。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge neutral&quot;&gt;雏形&lt;/span&gt;&lt;/td&gt;&lt;td&gt;当前 3D 数据为 0；经纬高参数未参与 3D 定位；PDF 快速翻页可能画布与页码错位。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;系统管理&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;管线、日志、清数、配置、模型、边界、缓存。&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;高权限未隔离&lt;/span&gt;&lt;/td&gt;&lt;td&gt;无 RBAC/重认证/完整审计；当前认证关闭使所有破坏性操作直接可达。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;接口与页面覆盖&lt;/h3&gt;
      &lt;div class=&quot;rpr-three&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;前端入口&lt;/h3&gt;
          &lt;p&gt;地图总览、资源概览、图斑对比、文物巡查、系统管理；独立登录、3D、PDF、数字名片页面。地图/巡查/图斑复用同一 Cesium 实例。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;后端路由&lt;/h3&gt;
          &lt;p&gt;约 77 个装饰器端点，覆盖 relics、stats、weather、chat、patrol、boundaries、CRS、admin、parcels、card、TTS 和 tile routes。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;存储模型&lt;/h3&gt;
          &lt;p&gt;主库 9 类表/索引结构；巡查 2 张核心表；图斑使用 layers.json + GeoJSON + analysis JSON；媒体和地图资产使用文件系统。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;data&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;07 · 真实数据资产画像&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;DATA PROFILE&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-callout&quot;&gt;&lt;strong&gt;数据库状态：&lt;/strong&gt;&lt;code&gt;PRAGMA integrity_check&lt;/code&gt; 返回 &lt;code&gt;ok&lt;/code&gt;，主库为 WAL 模式；R-Tree 和 FTS 索引各覆盖 1,108 条。巡查库当前路线 0、记录 0；图斑目录当前为空。&lt;/div&gt;

      &lt;h3&gt;7.1 数据与磁盘构成&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;资产&lt;/th&gt;&lt;th&gt;数量&lt;/th&gt;&lt;th&gt;体积 / 状态&lt;/th&gt;&lt;th&gt;说明&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;原始 DOCX&lt;/td&gt;&lt;td&gt;1,110&lt;/td&gt;&lt;td&gt;8.311 GiB&lt;/td&gt;&lt;td&gt;主要输入；文档结构化过程可发送给外部 AI。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;中间 Markdown&lt;/td&gt;&lt;td&gt;1,110&lt;/td&gt;&lt;td&gt;约 8.6 MiB&lt;/td&gt;&lt;td&gt;Step00 产物，后续导入优先来源。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;照片文件&lt;/td&gt;&lt;td&gt;11,918&lt;/td&gt;&lt;td&gt;7.821 GiB&lt;/td&gt;&lt;td&gt;数据库引用与文件无孤儿；源索引多 8 个重复计数。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;图纸文件&lt;/td&gt;&lt;td&gt;2,748&lt;/td&gt;&lt;td&gt;0.462 GiB&lt;/td&gt;&lt;td&gt;源索引多 1 个重复计数。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;瓦片缓存&lt;/td&gt;&lt;td&gt;8,969 tile&lt;/td&gt;&lt;td&gt;约 81 MiB&lt;/td&gt;&lt;td&gt;无总配额、TTL 或剩余空间保护。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;运行输出&lt;/td&gt;&lt;td&gt;约 23,673 文件&lt;/td&gt;&lt;td&gt;8.401 GiB&lt;/td&gt;&lt;td&gt;含媒体、数据库、数据集、边界、缓存和日志。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;业务总盘点&lt;/td&gt;&lt;td&gt;约 25,941 文件&lt;/td&gt;&lt;td&gt;约 17.99 GB&lt;/td&gt;&lt;td&gt;未计 node_modules；大部分为本地忽略数据。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-two&quot; style=&quot;margin-top:24px&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;7.2 文物类别&lt;/h3&gt;
          &lt;div class=&quot;rpr-bars&quot;&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;correctness&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;08 · 数据与业务正确性发现&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;CORRECTNESS&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-callout amber&quot;&gt;&lt;strong&gt;总体判断：&lt;/strong&gt;基础台账和空间坐标完整度高，但部分“二次指标”与“业务闭环”没有共享同一数据源。它们适合演示，不应在修复前作为考核、风险排序或法定分析依据。&lt;/div&gt;

      &lt;div class=&quot;rpr-risk&quot;&gt;
        &lt;div class=&quot;rpr-risk-level p1&quot;&gt;高&lt;small&gt;数据口径&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-risk-body&quot;&gt;
          &lt;h3&gt;年代映射漏掉 154 / 1,108 条（13.9%）&lt;/h3&gt;
          &lt;p&gt;前端 ERA_MAP 不识别当前规范值“战国秦汉”“宋辽西夏金元”等，ERA_ORDER 又只保留九个标准值。综合年代图表和时间轴中间档会遗漏这些记录；后端另用关键词口径，其中“宋辽西夏金元”还可能先命中“夏”而误归“夏商周”。&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;整改：&lt;/strong&gt;在数据层建立唯一的 canonical era code，前后端共享字典；为 1,108 条做迁移/回归快照，禁止图表静默丢弃未知值。&lt;/p&gt;
          &lt;p class=&quot;rpr-evidence&quot;&gt;证据：&lt;code&gt;platform/webgis-react/src/utils/dict.ts:126-136,181-191&lt;/code&gt;；&lt;code&gt;Dashboard.tsx:24-34&lt;/code&gt;；&lt;code&gt;timelineStore.ts:49-57&lt;/code&gt;；&lt;code&gt;routers/stats.py:21-45&lt;/code&gt;。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-risk&quot;&gt;
        &lt;div class=&quot;rpr-risk-level p1&quot;&gt;高&lt;small&gt;业务断链&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-risk-body&quot;&gt;
          &lt;h3&gt;健康度没有消费真实巡查记录&lt;/h3&gt;
          &lt;p&gt;健康图读取主记录的 &lt;code&gt;last_patrol_at&lt;/code&gt;，当前 1,108 条全部为空；真实打卡时间只存在 patrol.db，虽用于到期计算，却未合并进文物摘要。演示生成器又写 ISO 字符串，而前端只按数值时间戳计算，结果为 NaN 后静默跳过扣分。&lt;/p&gt;
          &lt;p&gt;当前健康分布几乎只是保存状况再包装：好 20、关注 1,008、风险 80，不能代表真实巡查履约。&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;整改：&lt;/strong&gt;由后端提供带版本的 health API，显式 join patrol.db，统一 ISO 8601 或 epoch 类型并附带每项得分依据。&lt;/p&gt;
          &lt;p class=&quot;rpr-evidence&quot;&gt;证据：&lt;code&gt;utils/health.ts:49-83&lt;/code&gt;；&lt;code&gt;MapView.tsx:365-382&lt;/code&gt;；&lt;code&gt;patrol_service.py:333-373&lt;/code&gt;。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-risk&quot;&gt;
        &lt;div class=&quot;rpr-risk-level p1&quot;&gt;高&lt;small&gt;前后端契约&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-risk-body&quot;&gt;
          &lt;h3&gt;巡查报告、状态与站点结果存在多处错配&lt;/h3&gt;
          &lt;p&gt;AI 评估后端成功返回 &lt;code&gt;{record_id, assessment}&lt;/code&gt;，前端却等待 &lt;code&gt;{ok, assessment}&lt;/code&gt;，会把成功响应判为不可用；后端状态 &lt;code&gt;in_progress&lt;/code&gt; 与前端映射 &lt;code&gt;doing&lt;/code&gt; 不一致；路线只返回总 checked/verified，前端却读取每个 stop 的标记，导致每站仍显示未打卡。&lt;/p&gt;
          &lt;p&gt;“某处周边 N 处”可能返回锚点 + N 处而变成 N+1；30 站路线通过高德 App URI 时最多保留 16 个途经点，余下站点静默丢失。&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;整改：&lt;/strong&gt;以 OpenAPI 生成 TS 客户端；补契约测试；明确每站状态、评估响应、N 的含义和导航拆段策略。&lt;/p&gt;
          &lt;p class=&quot;rpr-evidence&quot;&gt;证据：&lt;code&gt;routers/patrol.py:130-145,329-343,568-592&lt;/code&gt;；&lt;code&gt;api/patrol.ts:91-97&lt;/code&gt;；&lt;code&gt;PatrolReportModal.tsx:41-47&lt;/code&gt;；&lt;code&gt;amap_service.py:173-201&lt;/code&gt;。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:25px&quot;&gt;其他已确认正确性问题&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;领域&lt;/th&gt;&lt;th&gt;发现&lt;/th&gt;&lt;th&gt;影响&lt;/th&gt;&lt;th&gt;建议&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;媒体计数&lt;/td&gt;&lt;td&gt;源索引 11,926 张照片/2,749 张图纸；数据库唯一约束后为 11,918/2,748，但 8 个文物照片计数和 1 个图纸计数未回算。&lt;/td&gt;&lt;td&gt;详情 KPI 与真实可访问资源相差 1。&lt;/td&gt;&lt;td&gt;入库后按唯一表聚合回写计数，增加 reconciliation 报告。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;两线匹配&lt;/td&gt;&lt;td&gt;5,777 个去重面中仅 796 匹配，4,981 未匹配（86.2%）；最终数据库去重为 790 个，覆盖 353 处文物。&lt;/td&gt;&lt;td&gt;“两线完整度”低，且源名称与台账名称不一致。&lt;/td&gt;&lt;td&gt;建立可维护别名表、模糊候选人工确认与匹配版本。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Step01 输入&lt;/td&gt;&lt;td&gt;1,110 Markdown 最终 1,108 条；一条业务编号为“|”的重复异常，一条无有效坐标；曾出现 &lt;code&gt;drawings\|&lt;/code&gt; 媒体失败路径。&lt;/td&gt;&lt;td&gt;输入数量与主库数量差异容易被误判为丢数。&lt;/td&gt;&lt;td&gt;生成 reject.csv，记录原文件、规则、错误与人工处置状态。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;主库重建&lt;/td&gt;&lt;td&gt;Step03 在目标库原地 DROP 表并重建，连 audit_log 一并清空；后台 reload 未确保旧线程连接全部关闭。&lt;/td&gt;&lt;td&gt;失败可留下空库/半库；在线读可能看到旧 schema；审计不可持续。&lt;/td&gt;&lt;td&gt;临时库构建→完整性/数量校验→原子替换；持久审计独立库；显式连接代际。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;FTS 潜伏缺陷&lt;/td&gt;&lt;td&gt;CRUD 更新删除再插入 FTS 行，rowid 变化；搜索却用 FTS rowid 关联 R-Tree id_int。&lt;/td&gt;&lt;td&gt;未来开放 CRUD 后可能搜到错误文物。&lt;/td&gt;&lt;td&gt;显式维护稳定 rowid 或以 archive_code/UUID join，并补 CRUD 搜索回归测试。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;管线特征扫描&lt;/td&gt;&lt;td&gt;&lt;code&gt;run_pipeline&lt;/code&gt; 只在循环前检测一次输入。若仅有 DOCX，Step00 新生成 Markdown 后 Step01 不刷新 feature。&lt;/td&gt;&lt;td&gt;单次全流程可能错误认为 Step01 仍缺输入。&lt;/td&gt;&lt;td&gt;每一步成功后重新探测依赖特征，或把产物作为显式 DAG 输出。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;边界 / CRS&lt;/td&gt;&lt;td&gt;Step02 以首点 x&amp;gt;1,000,000 判断投影；约 500,000 m 的高斯坐标可能当经纬度。多部件 SHP 的 part 可能被当洞。&lt;/td&gt;&lt;td&gt;边界可能静默错位或拓扑错误。&lt;/td&gt;&lt;td&gt;强制读取/声明 CRS；使用 pyproj/GeoPandas；保存转换报告与几何有效性校验。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;图斑面积&lt;/td&gt;&lt;td&gt;以经纬度平方乘纬度近似，任意 PROJCS 粗略按高斯处理。&lt;/td&gt;&lt;td&gt;只能辅助预判，不可作为法定测绘面积。&lt;/td&gt;&lt;td&gt;转当地等面积投影后计算，并在 UI 明示“辅助分析，非测绘结论”。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;统计筛选&lt;/td&gt;&lt;td&gt;地图手工类别/级别与图表点选合并逻辑不一致；乡镇显示值去前缀但后端精确匹配；资源大屏按数组位置解释级别。&lt;/td&gt;&lt;td&gt;地图数量、图表与 KPI 可互相不一致。&lt;/td&gt;&lt;td&gt;把过滤器表示成唯一 AST/DTO，在后端聚合并返回筛选口径。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;边界清理&lt;/td&gt;&lt;td&gt;清理接口把 query token 拼路径，无白名单。&lt;/td&gt;&lt;td&gt;可通过路径片段删除边界目录外的其他输出 GeoJSON。&lt;/td&gt;&lt;td&gt;只接受枚举 id，resolve 后验证位于允许目录，写安全测试。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;security&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;09 · 安全、隐私与外部数据流审计&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;SECURITY&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-alert&quot;&gt;
        &lt;strong&gt;现实暴露组合：&lt;/strong&gt;
        &lt;p&gt;&lt;code&gt;0.0.0.0&lt;/code&gt; + &lt;code&gt;enable_auth=false&lt;/code&gt; + 默认管理员口令 + 已配置真实外部凭据。当前服务虽已停止，但过去日志显示曾成功按该模式启动。未发现已被利用的证据，不能据此视为安全。&lt;/p&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-risk&quot;&gt;
        &lt;div class=&quot;rpr-risk-level p0&quot;&gt;P0&lt;small&gt;立即阻断&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-risk-body&quot;&gt;
          &lt;h3&gt;认证关闭时，局域网任意客户端可直接操作管理面&lt;/h3&gt;
          &lt;p&gt;可启动管线、读取任务日志与路径、清空输出乃至原始输入、修改外部模型配置、清除/下载瓦片、上传图斑、增删巡查路线、调用付费 AI/TTS。“确认短语”写在源码中，不构成身份认证。&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;立即动作：&lt;/strong&gt;防火墙限制 8000；服务先绑定 127.0.0.1；启用认证并更换默认口令；轮换 SiliconFlow、DeepSeek、高德凭据；给 admin/写操作增加服务端授权依赖和近期重认证。&lt;/p&gt;
          &lt;p class=&quot;rpr-evidence&quot;&gt;证据：&lt;code&gt;config.example.yaml:147-157&lt;/code&gt;；&lt;code&gt;platform/webgis/main.py:217-230&lt;/code&gt;；&lt;code&gt;routers/admin.py:278-460,749-819&lt;/code&gt;。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-risk&quot;&gt;
        &lt;div class=&quot;rpr-risk-level p0&quot;&gt;P0&lt;small&gt;凭据外送&lt;/small&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-risk-body&quot;&gt;
          &lt;h3&gt;修改 AI base_url 后可把现有 API Key 发往攻击者主机&lt;/h3&gt;
          &lt;p&gt;管理配置允许任意 SiliconFlow/DeepSeek base URL；Key 留空时保留旧值，然后用“旧 Key + 新主机”重新初始化 OpenAI 兼容客户端。调用模型列表或聊天即可向新主机发送 Authorization。&lt;/p&gt;
          &lt;p&gt;&lt;strong&gt;立即动作：&lt;/strong&gt;仅允许预设官方 HTTPS 主机；目标主机与凭据绑定；改变主机必须重新输入凭据；拒绝私网/回环/链路本地和非白名单重定向；配置变更写不可抵赖审计。&lt;/p&gt;
          &lt;p class=&quot;rpr-evidence&quot;&gt;证据：&lt;code&gt;routers/admin.py:670-682,749-804&lt;/code&gt;；&lt;code&gt;services/ai_service.py:25-48&lt;/code&gt;。&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:25px&quot;&gt;P1 高风险清单&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;风险&lt;/th&gt;&lt;th&gt;可利用条件 / 影响&lt;/th&gt;&lt;th&gt;核心整改&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 瓦片单请求内存 DoS&lt;/td&gt;&lt;td&gt;世界 bbox + z17 会尝试构造 17,179,869,184 个 tuple；任务、线程、磁盘均无上限。&lt;/td&gt;&lt;td&gt;公式估算、不枚举；限制业务 bbox/zoom/5 万瓦片；有界任务队列、磁盘配额和取消。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 认证协议缺陷&lt;/td&gt;&lt;td&gt;API 未登录返回 302/HTML，而前端只识别 401；认证关闭时任意账号可预签 7 天 cookie；会话不复核用户；回跳允许 &lt;code&gt;//evil&lt;/code&gt;。&lt;/td&gt;&lt;td&gt;API JSON 401；关闭认证不签 cookie；启用时轮换 secret；密码哈希、限速、撤销、CSRF、Secure cookie。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 上传 / ZIP bomb&lt;/td&gt;&lt;td&gt;文件完整读入后才检查 20/200 MB；不验图片魔数/像素；ZIP 无展开大小、数量、压缩比、几何复杂度限制。&lt;/td&gt;&lt;td&gt;网关与流式硬上限；预检 ZIP 元数据；图片验证/重编码；feature/vertex/解析时长配额。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 公开 TTS 费用滥用&lt;/td&gt;&lt;td&gt;&lt;code&gt;/api/tts/*&lt;/code&gt; 明确免登录，语言、音色、scope、任意 speed 组合可绕过仅 60 项的进程缓存。&lt;/td&gt;&lt;td&gt;预生成静态音频或签名短 token；参数离散化；IP/全局限速、并发、日预算与熔断。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 巡查与公开资料隐私&lt;/td&gt;&lt;td&gt;照片目录公开静态挂载；EXIF 未清理；GPS 入库；路线 token 无过期；数字名片公开地址、状态、简介和照片。&lt;/td&gt;&lt;td&gt;授权下载；去 EXIF；token TTL/撤销；定义 GPS/照片保留期；按政策脱敏地址和坐标。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 第三方数据外发&lt;/td&gt;&lt;td&gt;DOCX 原文、全量台账、详细地址/保护信息、巡查照片、路线坐标可能发往 AI/高德，与“数据不出本机”宣传冲突。&lt;/td&gt;&lt;td&gt;外发清单、最小化/脱敏、管理员授权、完全离线模式、供应商数据处理约定。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 同步外部调用阻塞事件循环&lt;/td&gt;&lt;td&gt;单 Uvicorn 进程的 async 路由内调用最长 120 秒同步 AI/高德客户端，一次慢请求可阻塞全部 API/静态资源。&lt;/td&gt;&lt;td&gt;异步客户端或 threadpool；独立并发信号量、超时、熔断；长任务进入有界队列。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;P1&lt;/span&gt; 数据库非原子重建&lt;/td&gt;&lt;td&gt;原地 DROP 表，清空审计；失败/并发时可出现空库、半库或旧连接。&lt;/td&gt;&lt;td&gt;版本迁移；临时库构建校验后原子切换；管线前备份与恢复演练。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;外部数据流矩阵&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;提供方&lt;/th&gt;&lt;th&gt;可能发送的数据&lt;/th&gt;&lt;th&gt;用途&lt;/th&gt;&lt;th&gt;治理要求&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;SiliconFlow / 兼容模型&lt;/td&gt;&lt;td&gt;DOCX 正文、全库摘要/简介、巡查照片、讲解文本&lt;/td&gt;&lt;td&gt;结构化、问答、视觉评估、TTS&lt;/td&gt;&lt;td&gt;按字段分级与最小化；禁任意 base URL；预算/限流；明确保留政策。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;DeepSeek&lt;/td&gt;&lt;td&gt;DOCX 正文&lt;/td&gt;&lt;td&gt;Step00 第二提取通道&lt;/td&gt;&lt;td&gt;确认材料能否出域；必要时本地模型；保留任务与同意记录。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;高德&lt;/td&gt;&lt;td&gt;起终点、文物位置、路线地名&lt;/td&gt;&lt;td&gt;地理编码、驾车规划、导航&lt;/td&gt;&lt;td&gt;减少精确敏感坐标；明确第三方传输；限制调用和日志。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;地图 / 天气 / 边界服务&lt;/td&gt;&lt;td&gt;瓦片坐标、行政区、服务端 IP、天气位置&lt;/td&gt;&lt;td&gt;底图、边界下载、预报&lt;/td&gt;&lt;td&gt;离线模式开关；来源许可与归属；缓存和失败策略。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;quality&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;10 · 测试、CI、依赖与工程质量&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;QUALITY&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-stat-grid rpr-stat-5&quot;&gt;
        &lt;div class=&quot;rpr-stat&quot;&gt;&lt;span class=&quot;num&quot;&gt;29&lt;/span&gt;&lt;span class=&quot;label&quot;&gt;pytest 全通过&lt;/span&gt;&lt;span class=&quot;note&quot;&gt;7 个测试文件&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-stat&quot;&gt;&lt;span class=&quot;num&quot;&gt;0&lt;/span&gt;&lt;span class=&quot;label&quot;&gt;Python AST 失败&lt;/span&gt;&lt;span class=&quot;note&quot;&gt;43 个 .py&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-stat&quot;&gt;&lt;span class=&quot;num&quot;&gt;PASS&lt;/span&gt;&lt;span class=&quot;label&quot;&gt;TypeScript strict&lt;/span&gt;&lt;span class=&quot;note&quot;&gt;npm run type-check&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-stat&quot;&gt;&lt;span class=&quot;num&quot;&gt;0&lt;/span&gt;&lt;span class=&quot;label&quot;&gt;pip broken deps&lt;/span&gt;&lt;span class=&quot;note&quot;&gt;python -m pip check&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;rpr-stat&quot;&gt;&lt;span class=&quot;num&quot;&gt;7&lt;/span&gt;&lt;span class=&quot;label&quot;&gt;生产 npm 漏洞&lt;/span&gt;&lt;span class=&quot;note&quot;&gt;3 high / 4 moderate&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;rpr-two&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;已有保障&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;29 个后端测试全部通过，数据库完整性正常。&lt;/li&gt;
            &lt;li&gt;TypeScript &lt;code&gt;strict: true&lt;/code&gt;，当前类型检查通过。&lt;/li&gt;
            &lt;li&gt;天气服务有 SSRF 白名单、缓存与过期兜底测试。&lt;/li&gt;
            &lt;li&gt;标准边界有数量、bbox、字段、哈希恢复契约。&lt;/li&gt;
            &lt;li&gt;多数 SQL 参数化，写列白名单并有乐观锁基础。&lt;/li&gt;
            &lt;li&gt;CI 使用 &lt;code&gt;npm ci&lt;/code&gt;，执行 type-check 与 build。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;覆盖缺口&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;约 27,672 行产品源码，仅 29 个 Python 测试。&lt;/li&gt;
            &lt;li&gt;无 React 单元/组件、可访问性、视觉回归或 E2E。&lt;/li&gt;
            &lt;li&gt;无 lint、格式、覆盖率阈值、启动 smoke test。&lt;/li&gt;
            &lt;li&gt;登录测试未经过 ASGI 中间件，不覆盖 302/401/Cookie/权限矩阵。&lt;/li&gt;
            &lt;li&gt;清数、配置、TTS、上传、ZIP、瓦片、迁移、并发均无恶意输入测试。&lt;/li&gt;
            &lt;li&gt;CI 只有 Windows / Python 3.11 / Node 20；没有 Linux 路径。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;npm 审计结果（2026-07-11）&lt;/h3&gt;
      &lt;p&gt;本机默认 npmmirror 不实现 audit API，改用 npm 官方审计端点后得到：全部依赖 10 项（4 high / 5 moderate / 1 low）；排除 dev 后仍有 7 项（3 high / 4 moderate）。以下为包级结果，不等同于每项都在浏览器运行时可直接利用，但应纳入升级回归。&lt;/p&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;等级&lt;/th&gt;&lt;th&gt;包 / 版本&lt;/th&gt;&lt;th&gt;项目位置与影响概述&lt;/th&gt;&lt;th&gt;建议&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;High&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;axios@1.15.2&lt;/code&gt;&lt;/td&gt;&lt;td&gt;直接生产依赖；包含 ReDoS、资源分配 DoS 及部分 Node adapter 风险。&lt;/td&gt;&lt;td&gt;直接升级并回归 API/SSE/上传。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;High&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;form-data@4.0.5&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Axios 传递依赖；CRLF 注入主要影响 Node adapter。&lt;/td&gt;&lt;td&gt;随 Axios/lockfile 更新。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;High&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;protobufjs@8.0.3&lt;/code&gt;&lt;/td&gt;&lt;td&gt;Cesium 传递依赖；无界递归 DoS 等。&lt;/td&gt;&lt;td&gt;更新 Cesium 后确认修复版本。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;Moderate&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;dompurify@3.4.1&lt;/code&gt;&lt;/td&gt;&lt;td&gt;多项 sanitizer bypass；项目直接依赖当前并未实际使用。&lt;/td&gt;&lt;td&gt;移除无用直接依赖，并更新 Cesium 链。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;Moderate&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;echarts@5.6.0&lt;/code&gt;&lt;/td&gt;&lt;td&gt;XSS；图表标签来自导入业务数据，应按不可信输入处理。&lt;/td&gt;&lt;td&gt;升级到审计修复版本并做图表回归。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge warn&quot;&gt;Moderate&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;react-router(-dom)@6.30.3&lt;/code&gt;&lt;/td&gt;&lt;td&gt;协议相对路径开放重定向；项目登录回跳有同类缺陷。&lt;/td&gt;&lt;td&gt;升级并显式拒绝 &lt;code&gt;//&lt;/code&gt;。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;rpr-badge bad&quot;&gt;High · dev&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;vite@5.4.21&lt;/code&gt;&lt;/td&gt;&lt;td&gt;开发服务器路径/Windows 相关风险；不进入正式 bundle，但开发机仍需修复。&lt;/td&gt;&lt;td&gt;跨大版本升级分支，执行构建和 UI 回归。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;建议新增的质量门禁&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;优先级&lt;/th&gt;&lt;th&gt;门禁&lt;/th&gt;&lt;th&gt;最低验收&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;P0/P1&lt;/td&gt;&lt;td&gt;安全回归&lt;/td&gt;&lt;td&gt;权限矩阵、认证关闭行为、AI URL 白名单、瓦片上限、ZIP bomb、上传魔数、TTS 配额。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;P1&lt;/td&gt;&lt;td&gt;前后端契约&lt;/td&gt;&lt;td&gt;OpenAPI schema 校验；巡查评估/状态/stop；年代与健康度固定数据快照。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;P1&lt;/td&gt;&lt;td&gt;CI 供应链&lt;/td&gt;&lt;td&gt;&lt;code&gt;npm audit --omit=dev --registry=https://registry.npmjs.org&lt;/code&gt;、secret scan、Python 锁文件/hash、SBOM。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;P2&lt;/td&gt;&lt;td&gt;前端测试&lt;/td&gt;&lt;td&gt;Vitest + React Testing Library + axe；关键地图、巡查、图斑、登录使用 Playwright。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;P2&lt;/td&gt;&lt;td&gt;静态与覆盖率&lt;/td&gt;&lt;td&gt;Ruff、mypy/pyright、ESLint；逐步建立有意义的覆盖率阈值，而非只追求数字。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;P2&lt;/td&gt;&lt;td&gt;跨平台与启动&lt;/td&gt;&lt;td&gt;Windows + Linux matrix；lifespan、健康探针、静态资源和 DB smoke test。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;operations&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;11 · 性能、运维、可访问性与文档一致性&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;OPERATIONS&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-three&quot;&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;性能与扩展性&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;全量 DB → 内存、全量 API → 浏览器、bbox 查询三套并存。&lt;/li&gt;
            &lt;li&gt;CRUD 每次全量 reload，共享字典无读写锁。&lt;/li&gt;
            &lt;li&gt;聊天每次发送全量台账，成本/延迟线性增长。&lt;/li&gt;
            &lt;li&gt;6504 村的前端索引含 O(n²) 查找，并可能重复下载/解析边界。&lt;/li&gt;
            &lt;li&gt;当前“10,000+ 点流畅”缺正式基准、设备档位和验收数据。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;可观测性与恢复&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;无 &lt;code&gt;/healthz&lt;/code&gt;、&lt;code&gt;/readyz&lt;/code&gt;、request ID、指标、追踪和告警。&lt;/li&gt;
            &lt;li&gt;约 71 处 broad exception、30 处静默 pass、63 处 print。&lt;/li&gt;
            &lt;li&gt;部分接口返回 &lt;code&gt;str(e)&lt;/code&gt;，可能泄露内部路径/上游细节。&lt;/li&gt;
            &lt;li&gt;无日志/照片/瓦片保留策略和磁盘水位告警。&lt;/li&gt;
            &lt;li&gt;无备份恢复流程、迁移账本或灾备演练。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-card&quot;&gt;
          &lt;h3&gt;首屏与可访问性&lt;/h3&gt;
          &lt;ul&gt;
            &lt;li&gt;dist 约 16.56 MiB；登录/名片也预载 Cesium、Three、ECharts。&lt;/li&gt;
            &lt;li&gt;应按路由 lazy load，并给公开名片独立轻入口。&lt;/li&gt;
            &lt;li&gt;移动页禁止缩放；可点击 div/span 缺键盘语义。&lt;/li&gt;
            &lt;li&gt;Dialog 缺 aria-modal、焦点圈定/恢复；登录字段缺 label/autocomplete。&lt;/li&gt;
            &lt;li&gt;建议以 WCAG 2.1 AA 和 axe/键盘流程作为门禁。&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;文档与实现漂移&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;文档 / 宣称&lt;/th&gt;&lt;th&gt;当前实现&lt;/th&gt;&lt;th&gt;处理建议&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;“数据不出本机”&lt;/td&gt;&lt;td&gt;DOCX、全库摘要、地址/保护信息、巡查照片、路线坐标会按功能发送给 AI/高德。&lt;/td&gt;&lt;td&gt;改为“核心数据本地存储，可选增强会外发指定字段”，附数据流清单。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;同一 Cesium 覆盖 2.5D/3D&lt;/td&gt;&lt;td&gt;主图固定 Scene2D；3D Tiles 是独立 Three.js 页面。&lt;/td&gt;&lt;td&gt;更新架构图，或真正统一进 Cesium 后再宣称。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;3D 数据路径 &lt;code&gt;data/Get3D&lt;/code&gt;&lt;/td&gt;&lt;td&gt;实际读取 &lt;code&gt;data/input/05_models_3d&lt;/code&gt;。&lt;/td&gt;&lt;td&gt;统一路径、迁移脚本与 README。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;marked + DOMPurify 渲染&lt;/td&gt;&lt;td&gt;聊天使用自研转义/正则渲染器；这两个直接依赖未被业务源码使用。&lt;/td&gt;&lt;td&gt;文档对齐；移除无用依赖或恢复经审计的标准实现。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;AI 关闭时问答规则回退&lt;/td&gt;&lt;td&gt;问答返回 disabled error；规则回退主要在巡查意图/评估。&lt;/td&gt;&lt;td&gt;明确各模块 fallback，不把巡查规则泛化为聊天能力。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;换地区只改配置和数据&lt;/td&gt;&lt;td&gt;聊天 prompt、页标题、数字名片、边界导入器、行政代码仍硬编码济宁/嘉祥/山东。&lt;/td&gt;&lt;td&gt;配置化产品文案、种子资产与 adcode；建立 region package。&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;完整操作审计&lt;/td&gt;&lt;td&gt;audit_log 当前为空，DataStore CRUD/rollback 未接路由；管线任务日志不等于用户操作审计。&lt;/td&gt;&lt;td&gt;重新定义审计边界，记录操作者、来源、前后值、结果与不可变保留。&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3 style=&quot;margin-top:24px&quot;&gt;架构演进建议&lt;/h3&gt;
      &lt;div class=&quot;rpr-flow&quot;&gt;
        &lt;div class=&quot;rpr-flow-node&quot;&gt;
          &lt;strong&gt;现在&lt;/strong&gt;
          &lt;span&gt;单进程 + 全局单例&lt;/span&gt;
          &lt;span&gt;SQLite + 本地文件&lt;/span&gt;
          &lt;span&gt;适合隔离单机&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;rpr-flow-node&quot; style=&quot;border-top-color:#1f8a63&quot;&gt;
          &lt;strong&gt;加固版单机&lt;/strong&gt;
          &lt;span&gt;RBAC / 限额 / 审计&lt;/span&gt;
          &lt;span&gt;原子重建 / 备份&lt;/span&gt;
          &lt;span&gt;异步外部调用&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;rpr-flow-node&quot; style=&quot;border-top-color:#7657c9&quot;&gt;
          &lt;strong&gt;可信局域网&lt;/strong&gt;
          &lt;span&gt;TLS / 反代 / 服务守护&lt;/span&gt;
          &lt;span&gt;持久任务 / 指标告警&lt;/span&gt;
          &lt;span&gt;共享指标 API&lt;/span&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-arrow&quot;&gt;→&lt;/div&gt;
        &lt;div class=&quot;rpr-flow-node&quot; style=&quot;border-top-color:#c67a16&quot;&gt;
          &lt;strong&gt;若需公网 / 多实例&lt;/strong&gt;
          &lt;span&gt;外部数据库与对象存储&lt;/span&gt;
          &lt;span&gt;任务队列 / 集中会话&lt;/span&gt;
          &lt;span&gt;零信任与合规治理&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;p class=&quot;rpr-callout&quot;&gt;不建议为了“云原生”立即重写。先完成加固版单机，把安全边界、数据契约、原子性与可观测性做实；只有明确出现多用户并发、多实例或跨区域协作需求时，再引入外部数据库、对象存储与任务队列。&lt;/p&gt;
    &lt;/section&gt;

    &lt;section class=&quot;rpr-section&quot; id=&quot;roadmap&quot;&gt;
      &lt;div class=&quot;rpr-section-head&quot;&gt;&lt;h2&gt;12 · 整改路线、验收标准与上线判断&lt;/h2&gt;&lt;span class=&quot;rpr-section-no&quot;&gt;ROADMAP&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;rpr-timeline&quot;&gt;
        &lt;div class=&quot;rpr-step&quot;&gt;
          &lt;div class=&quot;rpr-step-time&quot;&gt;立即&lt;br&gt;0–24 小时&lt;/div&gt;
          &lt;div class=&quot;rpr-step-line&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-step-content&quot;&gt;
            &lt;h3&gt;止血：恢复安全边界&lt;/h3&gt;
            &lt;ul&gt;
              &lt;li&gt;保持服务停止，或临时仅绑定 127.0.0.1 / 防火墙白名单。&lt;/li&gt;
              &lt;li&gt;备份 config、主库、巡查库、输入、媒体与 manifest；验证可读。&lt;/li&gt;
              &lt;li&gt;启用认证、更换默认口令、轮换三个已配置外部凭据和 session secret。&lt;/li&gt;
              &lt;li&gt;禁用后台修改任意 AI base URL；保护 admin、瓦片写操作和 TTS。&lt;/li&gt;
            &lt;/ul&gt;
            &lt;p&gt;&lt;strong&gt;验收：&lt;/strong&gt;未登录写接口全为 JSON 401/403；非白名单主机无法连接；旧凭据与旧 cookie 失效。&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-step&quot;&gt;
          &lt;div class=&quot;rpr-step-time&quot;&gt;1–2 天&lt;/div&gt;
          &lt;div class=&quot;rpr-step-line&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-step-content&quot;&gt;
            &lt;h3&gt;硬限额：阻断低成本 DoS 与费用滥用&lt;/h3&gt;
            &lt;ul&gt;
              &lt;li&gt;瓦片使用公式估算，限制 bbox、zoom、总瓦片、任务数、并发和磁盘。&lt;/li&gt;
              &lt;li&gt;上传改流式上限；校验图片魔数/像素并重编码；ZIP 限展开大小、数量和压缩比。&lt;/li&gt;
              &lt;li&gt;TTS/聊天/AI 设参数白名单、请求长度、IP/用户/全局速率、并发、日预算与熔断。&lt;/li&gt;
              &lt;li&gt;边界清理改枚举白名单并验证 resolved path。&lt;/li&gt;
            &lt;/ul&gt;
            &lt;p&gt;&lt;strong&gt;验收：&lt;/strong&gt;恶意测试在受控资源内快速失败，且不会产生外部费用或写出允许目录。&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-step&quot;&gt;
          &lt;div class=&quot;rpr-step-time&quot;&gt;1 周内&lt;/div&gt;
          &lt;div class=&quot;rpr-step-line&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-step-content&quot;&gt;
            &lt;h3&gt;修契约：让业务指标可信&lt;/h3&gt;
            &lt;ul&gt;
              &lt;li&gt;统一年代 canonical code，回归 1,108 条，未知值显式归“待核”。&lt;/li&gt;
              &lt;li&gt;后端 join patrol.db 生成健康指标，返回评分依据与数据时间。&lt;/li&gt;
              &lt;li&gt;修巡查 assessment/status/stop 契约、N+1、30 站导航拆段。&lt;/li&gt;
              &lt;li&gt;媒体计数按入库去重结果回算；两线建立别名与人工确认台账。&lt;/li&gt;
              &lt;li&gt;修 API 302/401、开放重定向、cookie、logout/revocation、登录限速。&lt;/li&gt;
            &lt;/ul&gt;
            &lt;p&gt;&lt;strong&gt;验收：&lt;/strong&gt;地图、图表、KPI、巡查报告对同一筛选返回一致结果；契约测试覆盖成功和失败路径。&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-step&quot;&gt;
          &lt;div class=&quot;rpr-step-time&quot;&gt;2–4 周&lt;/div&gt;
          &lt;div class=&quot;rpr-step-line&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-step-content&quot;&gt;
            &lt;h3&gt;生产化：原子数据、隐私、监控与测试&lt;/h3&gt;
            &lt;ul&gt;
              &lt;li&gt;临时库构建+完整性/数量校验+原子替换；schema version；审计独立持久化。&lt;/li&gt;
              &lt;li&gt;巡查照片授权访问、去 EXIF；token TTL/撤销；GPS/照片/日志保留期。&lt;/li&gt;
              &lt;li&gt;结构化日志、request ID、health/readiness、磁盘/外部费用/任务告警。&lt;/li&gt;
              &lt;li&gt;升级生产依赖；CI 加安全、前端、E2E、Linux、coverage 与 secret scan。&lt;/li&gt;
              &lt;li&gt;发布 TLS/反代、Windows 服务或 systemd、备份恢复与回滚手册。&lt;/li&gt;
            &lt;/ul&gt;
            &lt;p&gt;&lt;strong&gt;验收：&lt;/strong&gt;完成恢复演练、故障注入和权限矩阵；关键告警可触达；依赖高危为 0 或有正式风险接受。&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;rpr-step&quot;&gt;
          &lt;div class=&quot;rpr-step-time&quot;&gt;1–2 个月&lt;/div&gt;
          &lt;div class=&quot;rpr-step-line&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;rpr-step-content&quot;&gt;
            &lt;h3&gt;规模化：去全量、降首屏、建立治理&lt;/h3&gt;
            &lt;ul&gt;
              &lt;li&gt;淘汰 deprecated 全量接口，聚合/筛选由后端完成，必要时点聚类/切片。&lt;/li&gt;
              &lt;li&gt;AI 改检索增强与最小上下文，不再每次发送全台账；提供可验证完全离线模式。&lt;/li&gt;
              &lt;li&gt;按路由懒加载 Cesium/Three/ECharts，数字名片独立轻入口并补动态 meta。&lt;/li&gt;
              &lt;li&gt;把济宁/嘉祥硬编码收敛为 region package；同步 README、架构图和外发声明。&lt;/li&gt;
              &lt;li&gt;只有明确需要多实例时再引入外部 DB、对象存储和任务队列。&lt;/li&gt;
            &lt;/ul&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;h3&gt;上线决策矩阵&lt;/h3&gt;
      &lt;div class=&quot;rpr-table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;目标场景&lt;/th&gt;&lt;th&gt;当前判断&lt;/th&gt;&lt;th&gt;最低前置条件&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {

    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };

    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);

      return;

  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {

    }

    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
