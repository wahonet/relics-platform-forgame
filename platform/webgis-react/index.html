<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f18" />
    <title>济宁市文物保护利用平台</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0a0f18;
        color: #eaf0f9;
        font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
      }
      .boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(900px 480px at 78% -8%, rgba(227, 185, 94, 0.07), transparent 65%),
          radial-gradient(1000px 560px at 12% 108%, rgba(61, 128, 216, 0.12), transparent 65%),
          #0a0f18;
        color: #8b99ad;
        font-size: 14px;
        letter-spacing: 2px;
        z-index: 9999;
      }
      .boot-loader .ring {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(227, 185, 94, 0.18);
        border-top-color: #e3b95e;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-right: 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="ring"></div>
        <div>正在加载济宁市文物保护利用平台...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
