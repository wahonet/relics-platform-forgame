<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据处理管理 - {{ full_name }}</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;--bd:rgba(88,166,255,.2);--bd-a:rgba(88,166,255,.5);--t1:#e6edf3;--t2:#8b949e;--t3:#c9d1d9;--accent:#58a6ff;--accent2:#79c0ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--gold:#ffd700}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--t1)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

.top-bar{height:56px;background:linear-gradient(135deg,rgba(13,17,23,.97),rgba(22,40,65,.97));border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;gap:16px;backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
.top-bar h1{font-size:17px;font-weight:600;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar .sep{color:var(--t2);font-size:14px}
.top-bar .sub{font-size:14px;color:var(--t2);font-weight:400}
.top-bar .actions{margin-left:auto;display:flex;gap:8px}
.top-bar .back, .top-bar .refresh{padding:6px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;color:var(--t2);font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit}
.top-bar .back:hover,.top-bar .refresh:hover{border-color:var(--accent);color:var(--accent)}

.container{max-width:1100px;margin:0 auto;padding:24px}

/* 概要计数卡 */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.sm-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:12px 14px}
.sm-card .sm-lbl{font-size:11px;color:var(--t2);margin-bottom:4px}
.sm-card .sm-val{font-size:22px;font-weight:700;color:var(--t1);line-height:1.2}
.sm-card .sm-sub{font-size:11px;color:var(--t2);margin-top:2px}

/* 管线 —— 竖排流程 */
.pipeline-v{position:relative;padding-left:20px}
.pipeline-v::before{content:'';position:absolute;left:20px;top:12px;bottom:12px;width:2px;background:linear-gradient(180deg,var(--bd) 0%,rgba(88,166,255,.35) 50%,var(--bd) 100%)}

.step{position:relative;margin-bottom:20px;padding-left:36px}
.step-node{position:absolute;left:-20px;top:14px;width:40px;height:40px;border-radius:50%;background:var(--bg2);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;z-index:2;transition:all .3s}
.step.done .step-node{border-color:var(--green);background:rgba(63,185,80,.1);box-shadow:0 0 0 4px rgba(63,185,80,.08)}
.step.partial .step-node{border-color:var(--yellow);background:rgba(210,153,34,.1);box-shadow:0 0 0 4px rgba(210,153,34,.08)}
.step.empty .step-node{border-color:var(--bd);background:var(--bg2)}
.step.running .step-node{border-color:var(--yellow);animation:pulseNode 1.2s infinite}
@keyframes pulseNode{0%,100%{box-shadow:0 0 0 4px rgba(210,153,34,.12)}50%{box-shadow:0 0 0 10px rgba(210,153,34,0)}}

.step-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;transition:border-color .2s}
.step-card:hover{border-color:var(--bd-a)}

.step-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.step-hdr .step-title{flex:1;min-width:0}
.step-hdr .step-name{font-size:15px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.step-hdr .step-idx{font-size:11px;color:var(--t2);background:var(--bg3);padding:2px 8px;border-radius:4px;letter-spacing:.5px;font-family:"Cascadia Code",monospace}
.step-hdr .step-flow{font-size:12px;color:var(--accent2);font-weight:500}
.step-hdr .step-desc{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5}

.step-badge{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-done{background:rgba(63,185,80,.14);color:var(--green)}
.badge-partial{background:rgba(210,153,34,.14);color:var(--yellow)}
.badge-empty{background:var(--bg3);color:var(--t2)}
.badge-running{background:rgba(210,153,34,.2);color:var(--yellow)}
.badge-error{background:rgba(248,81,73,.14);color:var(--red)}

/* 步骤主体:指标 + 进度 + 操作 */
.step-body{padding:14px 18px}

.metrics{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:14px}
.metric{text-align:center}
.metric .m-num{font-size:28px;font-weight:700;color:var(--t1);line-height:1.1}
.metric .m-num.accent{color:var(--accent)}
.metric .m-num.green{color:var(--green)}
.metric .m-lbl{font-size:11px;color:var(--t2);margin-top:4px}
.metric-arrow{font-size:22px;color:var(--t2);font-weight:300}

.progress{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:10px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .6s ease}
.progress-fill.done{background:linear-gradient(90deg,var(--green),#56d364)}
.progress-fill.partial{background:linear-gradient(90deg,var(--yellow),#e8b341)}

.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:14px}
.progress-meta b{color:var(--t1)}

.extras{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{font-size:11px;background:var(--bg3);color:var(--t2);padding:3px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.04)}
.chip b{color:var(--t1);margin-left:4px}

.step-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.step-actions .mtime{margin-left:auto;font-size:11px;color:var(--t2)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:none;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.85}
.btn-gold{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.4)}.btn-gold:hover{background:rgba(255,215,0,.25)}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--t2);border:1px solid var(--bd)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}.btn:disabled:hover{background:var(--bg3);color:var(--t2)}

/* 详情折叠区 */
.step-detail{border-top:1px solid rgba(255,255,255,.04);display:none;background:var(--bg)}
.step-detail.open{display:block}
.step-detail .det-inner{padding:14px 18px;max-height:420px;overflow:auto}
.det-empty{text-align:center;color:var(--t2);font-size:12px;padding:30px 0}

.grp{margin-bottom:12px}
.grp-hdr{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:6px;cursor:pointer;font-size:12px;user-select:none}
.grp-hdr:hover{background:var(--bg4)}
.grp-hdr .grp-name{flex:1;font-weight:600;color:var(--t1)}
.grp-hdr .grp-bar{width:80px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;flex-shrink:0}
.grp-hdr .grp-bar span{display:block;height:100%;background:var(--green)}
.grp-hdr .grp-count{color:var(--t2);min-width:70px;text-align:right;font-family:"Cascadia Code",monospace;font-size:11px}
.grp-hdr .grp-caret{color:var(--t2);transition:transform .2s}
.grp.open .grp-caret{transform:rotate(90deg)}

.grp-items{display:none;margin-top:6px;overflow:hidden;border-radius:6px;border:1px solid rgba(255,255,255,.04)}
.grp.open .grp-items{display:block}
.grp-items table{width:100%;border-collapse:collapse;font-size:12px}
.grp-items th{font-size:11px;color:var(--t2);font-weight:500;text-align:left;padding:6px 10px;background:var(--bg3);border-bottom:1px solid rgba(255,255,255,.04)}
.grp-items td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--t3)}
.grp-items tr:last-child td{border-bottom:none}
.grp-items tr:hover td{background:rgba(88,166,255,.04)}
.st-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
.st-done{background:var(--green)}.st-pending{background:var(--yellow)}.st-error{background:var(--red)}
.st-label.done{color:var(--green)}.st-label.pending{color:var(--yellow)}

/* 日志框 */
.log-box{background:#000;border:1px solid var(--bd);border-radius:6px;max-height:260px;overflow-y:auto;font-family:"Cascadia Code","Fira Code",monospace;font-size:11px;color:var(--t3);padding:10px 14px;line-height:1.7;white-space:pre-wrap;word-break:break-all;display:none;margin-top:10px}
.log-box.open{display:block}
.log-line{margin:0}
.log-line.err{color:var(--red)}.log-line.ok{color:var(--green)}.log-line.warn{color:var(--yellow)}

/* 上传卡片 & 任务历史 */
.extra-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:16px;margin-top:28px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.card-hdr{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px}
.card-hdr .c-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-hdr h3{font-size:14px;font-weight:600;color:var(--t1);flex:1}
.card-body{padding:16px 18px}
.card-body p{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:12px}

.upload-zone{border:2px dashed var(--bd);border-radius:8px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(88,166,255,.04)}
.upload-zone .uz-icon{font-size:28px;margin-bottom:6px}
.upload-zone p{font-size:12px;color:var(--t2)}
.upload-zone input{display:none}

.form-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.form-label{font-size:12px;color:var(--t2);min-width:50px}
.form-select{height:32px;padding:0 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--t3);font-size:12px;font-family:inherit;outline:none;flex:1}
.form-select:focus{border-color:var(--accent);color:var(--t1)}

.task-list{max-height:360px;overflow:auto}
.task-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.task-item:last-child{border-bottom:none}
.task-item .ti-name{flex:1;color:var(--t1);font-family:"Cascadia Code",monospace;font-size:11px}
.task-item .ti-time{color:var(--t2);font-size:11px;white-space:nowrap}
.task-item .ti-status{font-size:11px;font-weight:600;min-width:48px;text-align:right}
.ti-status.running{color:var(--yellow)}.ti-status.done{color:var(--green)}.ti-status.error{color:var(--red)}.ti-status.starting{color:var(--t2)}
</style>
</head>
<body>

<div class="top-bar">
    <h1>{{ full_name }}</h1>
    <span class="sep">/</span>
    <span class="sub">数据处理管理</span>
    <div class="actions">
        <button class="refresh" onclick="loadAll()">🔄 刷新</button>
        <button class="back" onclick="location.href='/'">返回地图</button>
    </div>
</div>

<div class="container">

<!-- 摘要指标 -->
<div class="summary" id="summary"></div>

<!-- 竖排管线 -->
<div class="pipeline-v" id="pipeline"></div>

<!-- 单文件上传 + 任务历史 -->
<div class="extra-cards">

    <div class="card">
        <div class="card-hdr">
            <div class="c-icon" style="background:rgba(88,166,255,.12);color:var(--accent)">📤</div>
            <h3>单文件上传提取</h3>
        </div>
        <div class="card-body">
            <p>把单个 .docx 档案上传到指定乡镇文件夹,可立即触发 step01 的结构化提取。</p>
            <div class="form-row">
                <span class="form-label">乡镇</span>
                <select class="form-select" id="uploadTownship"></select>
            </div>
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="uz-icon">📁</div>
                <p>点击选择或拖拽 .docx 文件到此处</p>
                <p id="dropFileName" style="color:var(--accent);margin-top:6px;display:none"></p>
                <input type="file" id="fileInput" accept=".docx">
            </div>
            <div class="form-row">
                <button class="btn btn-primary" id="uploadBtn" onclick="uploadAndProcess()" disabled>上传并提取</button>
                <button class="btn btn-outline" id="uploadOnlyBtn" onclick="uploadOnly()" disabled>仅上传</button>
            </div>
            <div class="log-box" id="logUpload"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-hdr">
            <div class="c-icon" style="background:rgba(210,153,34,.12);color:var(--yellow)">📋</div>
            <h3>任务历史</h3>
        </div>
        <div class="card-body">
            <div class="task-list" id="taskList">
                <div style="font-size:12px;color:var(--t2);text-align:center;padding:16px">暂无任务</div>
            </div>
        </div>
    </div>

</div>

</div>

<script>
const API = location.origin;

// 步骤颜色 / 按钮风格配置
const STEP_STYLES = {
    step01_convert_docs:       {color:'var(--accent)', btnClass:'btn-primary', btnText:'批量提取 DOCX'},
    step02_build_dataset:      {color:'var(--green)',  btnClass:'btn-green',   btnText:'重新生成数据集'},
    step03_extract_photos:     {color:'var(--purple)', btnClass:'btn-purple',  btnText:'批量提取照片'},
    step04_extract_drawings:   {color:'var(--gold)',   btnClass:'btn-gold',    btnText:'批量提取图纸'},
    step05_convert_worklogs:   {color:'var(--accent)', btnClass:'btn-primary', btnText:'转换工作日志'},
    step06_prepare_boundaries: {color:'var(--accent2)',btnClass:'btn-primary', btnText:'处理行政边界'},
};

let _pipeline = null;
let activePolls = {};

async function loadAll() {
    try {
        const [pipe, townships, tasks] = await Promise.all([
            fetch(API + '/api/admin/pipeline').then(r => r.json()),
            fetch(API + '/api/admin/townships').then(r => r.json()),
            fetch(API + '/api/admin/tasks').then(r => r.json()),
        ]);
        _pipeline = pipe;
        renderSummary(pipe);
        renderPipeline(pipe);
        renderTasks(tasks);
        refreshUploadDropdown(townships);
    } catch (e) { console.error('loadAll', e); }
}

function refreshUploadDropdown(tw) {
    const sel = document.getElementById('uploadTownship');
    if (sel.children.length > 0) return;
    tw.forEach(t => {
        const o = document.createElement('option');
        o.value = t.name; o.textContent = t.name + ' (' + t.docx_count + ' docx)';
        sel.appendChild(o);
    });
}

function renderSummary(pipe) {
    // 从 step01/step02/step03/step04 抽关键数据做摘要卡
    const s1 = pipe.steps[0], s2 = pipe.steps[1], s3 = pipe.steps[2], s4 = pipe.steps[3];
    const summary = [
        {lbl:'DOCX 档案总数', val: s1.input.total, sub: ''},
        {lbl:'Markdown 已提取', val: s1.output.total, sub: s1.pending ? ('剩余 ' + s1.pending + ' 个未处理') : '已全部提取'},
        {lbl:'数据集文物条目', val: s2.output.total, sub: s2.artifact_mtime ? ('生成于 ' + s2.artifact_mtime) : '尚未生成'},
        {lbl:'照片 / 图纸', val: (s3.output.extra?.['照片总数'] || 0) + ' / ' + (s4.output.extra?.['图纸总数'] || 0), sub: '文件数量'},
    ];
    document.getElementById('summary').innerHTML = summary.map(s =>
        `<div class="sm-card">
            <div class="sm-lbl">${s.lbl}</div>
            <div class="sm-val">${s.val}</div>
            <div class="sm-sub">${s.sub || '&nbsp;'}</div>
        </div>`
    ).join('');
}

function stateOf(step) {
    if (isRunning(step.id)) return 'running';
    if (step.input.total === 0) return 'empty';
    if (step.pending === 0 && step.output.total > 0) return 'done';
    if (step.output.total > 0) return 'partial';
    return 'empty';
}

function isRunning(stepId) {
    if (!_pipeline) return false;
    return Object.values(_pipeline.tasks || {}).some(t => t.script === stepId && t.status === 'running');
}

function badgeFor(step, state) {
    if (state === 'running') return '<span class="step-badge badge-running">● 运行中</span>';
    if (state === 'done')    return '<span class="step-badge badge-done">✓ 已完成</span>';
    if (state === 'partial') return `<span class="step-badge badge-partial">● 部分完成 ${step.progress}%</span>`;
    return '<span class="step-badge badge-empty">○ 未开始</span>';
}

function renderPipeline(pipe) {
    const el = document.getElementById('pipeline');
    el.innerHTML = pipe.steps.map((step, idx) => renderStep(step, idx)).join('');
}

function renderStep(step, idx) {
    const state = stateOf(step);
    const style = STEP_STYLES[step.id] || {color:'var(--accent)', btnClass:'btn-primary', btnText:'运行'};
    const fillClass = state === 'done' ? 'done' : (state === 'partial' ? 'partial' : '');
    const pct = Math.min(100, Math.max(0, step.progress || 0));
    const extras = step.output.extra ? Object.entries(step.output.extra).map(([k,v]) =>
        `<span class="chip">${k}<b>${v}</b></span>`).join('') : '';
    const mt = step.artifact_mtime ? `最近更新 ${step.artifact_mtime}` : '尚无产物';
    const idxStr = `STEP ${String(idx+1).padStart(2,'0')}`;
    const disableRun = !step.runnable || state === 'running';

    return `
    <div class="step ${state}" id="step-${step.id}">
        <div class="step-node" style="color:${style.color}">${step.icon}</div>
        <div class="step-card">
            <div class="step-hdr">
                <div class="step-title">
                    <div class="step-name">
                        <span class="step-idx">${idxStr}</span>
                        ${step.name}
                        <span class="step-flow">${step.flow}</span>
                    </div>
                    <div class="step-desc">${step.desc}</div>
                </div>
                ${badgeFor(step, state)}
            </div>
            <div class="step-body">
                <div class="metrics">
                    <div class="metric">
                        <div class="m-num">${step.input.total}</div>
                        <div class="m-lbl">${step.input.label}</div>
                    </div>
                    <div class="metric-arrow">→</div>
                    <div class="metric">
                        <div class="m-num accent">${step.output.total}</div>
                        <div class="m-lbl">${step.output.label}</div>
                    </div>
                </div>

                <div class="progress"><div class="progress-fill ${fillClass}" style="width:${pct}%"></div></div>
                <div class="progress-meta">
                    <span>进度 <b>${pct}%</b></span>
                    <span>已完成 <b>${step.output.total}</b> · 待处理 <b style="color:${step.pending>0?'var(--yellow)':'var(--green)'}">${step.pending}</b></span>
                </div>

                ${extras ? `<div class="extras">${extras}</div>` : ''}

                <div class="step-actions">
                    <button class="btn ${style.btnClass}" ${disableRun ? 'disabled' : ''}
                            onclick="runStep('${step.id}')">
                        ${state === 'running' ? '运行中…' : '▶ ' + style.btnText}
                    </button>
                    <button class="btn btn-outline" onclick="toggleDetail('${step.id}')">📋 查看详情</button>
                    <button class="btn btn-outline" onclick="toggleLog('${step.id}')">📊 实时日志</button>
                    <span class="mtime">${mt}</span>
                </div>

                <div class="log-box" id="log-${step.id}"></div>
            </div>
            <div class="step-detail" id="det-${step.id}">
                <div class="det-inner"><div class="det-empty">正在加载详情…</div></div>
            </div>
        </div>
    </div>`;
}

/* ── 详情展开 ──────────────────────────────────── */
async function toggleDetail(stepId) {
    const det = document.getElementById('det-' + stepId);
    const opened = det.classList.toggle('open');
    if (!opened) return;
    const inner = det.querySelector('.det-inner');
    inner.innerHTML = '<div class="det-empty">正在加载…</div>';
    try {
        const data = await fetch(API + '/api/admin/step/' + stepId + '/items').then(r => r.json());
        inner.innerHTML = renderDetail(stepId, data);
    } catch (e) {
        inner.innerHTML = `<div class="det-empty" style="color:var(--red)">加载失败: ${e.message}</div>`;
    }
}

function renderDetail(stepId, data) {
    const groups = data.groups || [];
    if (!groups.length || groups.every(g => g.total === 0)) {
        return '<div class="det-empty">暂无数据 —— 可能是尚未运行此步骤,或输入目录为空。</div>';
    }
    return groups.map((g, gi) => {
        const pct = g.total ? Math.round(g.done / g.total * 100) : 0;
        const head = `
            <div class="grp-hdr" onclick="this.parentElement.classList.toggle('open')">
                <span class="grp-caret">▶</span>
                <span class="grp-name">${g.name}</span>
                <span class="grp-bar"><span style="width:${pct}%"></span></span>
                <span class="grp-count">${g.done}/${g.total}</span>
            </div>`;
        const table = renderItemsTable(stepId, g.items);
        return `<div class="grp" ${gi === 0 ? 'style=""' : ''}>${head}<div class="grp-items">${table}</div></div>`;
    }).join('');
}

function renderItemsTable(stepId, items) {
    if (!items || !items.length) return '<div class="det-empty">此分组下暂无条目</div>';

    // 列配置:按 stepId 决定显示什么字段
    let cols;
    if (stepId === 'step02_build_dataset') {
        cols = [
            {k:'status', h:'状态', render:statusCell, w:'70px'},
            {k:'id',     h:'档案编号', w:'120px'},
            {k:'name',   h:'文物名称'},
            {k:'category', h:'类别', w:'80px'},
            {k:'era_stats', h:'年代', w:'90px'},
            {k:'condition', h:'保存', w:'70px'},
            {k:'risk_score', h:'风险', w:'60px'},
        ];
    } else if (stepId === 'step06_prepare_boundaries') {
        cols = [
            {k:'status', h:'状态', render:statusCell, w:'70px'},
            {k:'name', h:'边界层', w:'100px'},
            {k:'feature_count', h:'要素数'},
            {k:'output_size_kb', h:'大小(KB)', render:r=>r.output_size_kb||'-'},
            {k:'output_mtime', h:'更新时间', render:r=>r.output_mtime||'-'},
        ];
    } else {
        // step01 / step03 / step04 / step05 共用
        cols = [
            {k:'status', h:'状态', render:statusCell, w:'70px'},
            {k:'id', h:'编号', w:'120px'},
            {k:'name', h:'文件名'},
            {k:'input_size_kb', h:'输入(KB)', render:r=>r.input_size_kb||'-', w:'85px'},
            {k:'output_size_kb', h:'输出(KB)', render:r=>r.output_size_kb||'-', w:'85px'},
        ];
    }

    const thead = '<tr>' + cols.map(c => `<th${c.w ? ' style="width:'+c.w+'"' : ''}>${c.h}</th>`).join('') + '</tr>';
    const body = items.map(row => {
        return '<tr>' + cols.map(c => {
            const val = c.render ? c.render(row) : (row[c.k] ?? '-');
            return `<td>${val}</td>`;
        }).join('') + '</tr>';
    }).join('');
    return `<table><thead>${thead}</thead><tbody>${body}</tbody></table>`;
}

function statusCell(row) {
    const st = row.status || 'pending';
    const label = st === 'done' ? '已完成' : (st === 'error' ? '失败' : '待处理');
    return `<span class="st-label ${st}"><span class="st-dot st-${st}"></span>${label}</span>`;
}

/* ── 运行脚本 + 轮询日志 ──────────────────────────────────── */
function toggleLog(stepId) {
    document.getElementById('log-' + stepId).classList.toggle('open');
}

async function runStep(stepId) {
    const logEl = document.getElementById('log-' + stepId);
    logEl.classList.add('open');
    logEl.innerHTML = '<div class="log-line">正在启动任务...</div>';
    try {
        const res = await fetch(API + '/api/admin/run/' + stepId, {method:'POST'});
        if (!res.ok) {
            const e = await res.json();
            logEl.innerHTML += `<div class="log-line err">启动失败: ${e.detail || res.status}</div>`;
            return;
        }
        const data = await res.json();
        logEl.innerHTML += `<div class="log-line ok">已启动任务 ${data.task_id} (${data.script})</div>`;
        pollTask(data.task_id, stepId);
    } catch (e) {
        logEl.innerHTML += `<div class="log-line err">请求失败: ${e.message}</div>`;
    }
}

function pollTask(taskId, stepId) {
    if (activePolls[taskId]) return;
    activePolls[taskId] = true;
    const logEl = document.getElementById('log-' + stepId) || document.getElementById('logUpload');

    const iv = setInterval(async () => {
        try {
            const t = await fetch(API + '/api/admin/task/' + taskId).then(r => r.json());
            logEl.innerHTML = (t.log || []).map(l => {
                let cls = '';
                if (/⚠|警告|WARNING/i.test(l)) cls = 'warn';
                else if (/✓|成功|完成|Done/i.test(l)) cls = 'ok';
                else if (/错误|失败|Error|Exception/i.test(l)) cls = 'err';
                return `<div class="log-line ${cls}">${escHtml(l)}</div>`;
            }).join('');
            logEl.scrollTop = logEl.scrollHeight;

            if (t.status === 'done' || t.status === 'error') {
                clearInterval(iv);
                delete activePolls[taskId];
                loadAll();
            }
        } catch (e) { console.error('poll', e); }
    }, 1500);
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTasks(tasks) {
    const el = document.getElementById('taskList');
    if (!tasks || !tasks.length) {
        el.innerHTML = '<div style="font-size:12px;color:var(--t2);text-align:center;padding:16px">暂无任务</div>';
        return;
    }
    el.innerHTML = tasks.map(t => `
        <div class="task-item">
            <span class="ti-name">${t.script}</span>
            <span class="ti-time">${t.started}${t.finished ? ' → ' + t.finished : ''}</span>
            <span class="ti-status ${t.status}">${t.status}</span>
        </div>
    `).join('');
}

/* ── 单文件上传 ──────────────────────────────────── */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
let selectedFile = null;

fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
    if (!f.name.endsWith('.docx')) { alert('仅支持 .docx 文件'); return; }
    selectedFile = f;
    document.getElementById('dropFileName').style.display = 'block';
    document.getElementById('dropFileName').textContent = f.name + ' (' + (f.size/1024).toFixed(1) + ' KB)';
    document.getElementById('uploadBtn').disabled = false;
    document.getElementById('uploadOnlyBtn').disabled = false;
}

async function uploadAndProcess() {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.textContent = '上传中...';
    const logEl = document.getElementById('logUpload');
    logEl.classList.add('open');
    logEl.innerHTML = `<div class="log-line">正在上传 ${selectedFile.name}...</div>`;

    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('township', document.getElementById('uploadTownship').value);

    try {
        const res = await fetch(API + '/api/admin/process-single', {method:'POST', body: fd});
        const data = await res.json();
        if (!res.ok) {
            logEl.innerHTML += `<div class="log-line err">${data.detail || '上传失败'}</div>`;
            btn.textContent = '上传并提取'; btn.disabled = false;
            return;
        }
        logEl.innerHTML += `<div class="log-line ok">${data.message}</div>`;
        btn.textContent = '提取中...';
        pollTask(data.task_id, 'step01_convert_docs');
    } catch (e) {
        logEl.innerHTML += `<div class="log-line err">请求失败: ${e.message}</div>`;
    }
    btn.textContent = '上传并提取'; btn.disabled = false;
}

async function uploadOnly() {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadOnlyBtn');
    btn.disabled = true; btn.textContent = '上传中...';
    const logEl = document.getElementById('logUpload');
    logEl.classList.add('open');

    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('township', document.getElementById('uploadTownship').value);

    try {
        const res = await fetch(API + '/api/admin/upload-single', {method:'POST', body: fd});
        const data = await res.json();
        if (!res.ok) logEl.innerHTML += `<div class="log-line err">${data.detail || '失败'}</div>`;
        else logEl.innerHTML += `<div class="log-line ok">${data.message}</div>`;
    } catch (e) {
        logEl.innerHTML += `<div class="log-line err">${e.message}</div>`;
    }
    btn.textContent = '仅上传'; btn.disabled = false;
    loadAll();
}

loadAll();
setInterval(loadAll, 15000);
</script>
