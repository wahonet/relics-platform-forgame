<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四普档案阅读器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
body{background:radial-gradient(ellipse at center,#2a1f3d 0%,#0f0c18 100%)}

.viewer-wrap{display:flex;flex-direction:column;width:100%;height:100%}

/* 顶部栏 */
.top-bar{height:48px;background:rgba(13,17,23,.95);border-bottom:1px solid rgba(88,166,255,.2);
  display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:20;
  backdrop-filter:blur(10px);justify-content:center;position:relative}
.top-bar .title{color:#e6edf3;font-size:15px;font-weight:600;position:absolute;left:16px;
  max-width:30%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-bar .center-group{display:flex;align-items:center;gap:10px}
.top-bar .page-info{color:#8b949e;font-size:13px;min-width:100px;text-align:center}
.top-bar .right-group{position:absolute;right:16px;display:flex;align-items:center;gap:8px}
.tb{height:32px;padding:0 14px;background:rgba(255,255,255,.06);border:1px solid rgba(88,166,255,.2);
  border-radius:6px;color:#c9d1d9;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all .15s;font-family:inherit;user-select:none}
.tb:hover{background:rgba(88,166,255,.15);border-color:rgba(88,166,255,.4);color:#58a6ff}
.tb:disabled{opacity:.3;cursor:not-allowed}
.tb svg{width:16px;height:16px;fill:currentColor}

/* 主内容区（含左侧面板） */
.main-area{flex:1;display:flex;overflow:hidden}

/* 左侧缩略图面板 */
.thumb-panel{width:160px;background:rgba(13,17,23,.95);border-right:1px solid rgba(88,166,255,.2);
  overflow-y:auto;padding:8px;flex-shrink:0;transition:width .3s,padding .3s,opacity .3s;
  backdrop-filter:blur(10px);position:relative}
.thumb-panel.collapsed{width:0;padding:0;overflow:hidden;opacity:0}
.thumb-toggle{position:absolute;top:50%;right:-16px;transform:translateY(-50%);z-index:18;
  width:16px;height:48px;background:rgba(13,17,23,.9);border:1px solid rgba(88,166,255,.2);
  border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#8b949e;transition:all .2s}
.thumb-toggle:hover{background:rgba(88,166,255,.15);color:#58a6ff}
.thumb-toggle svg{width:12px;height:12px;fill:currentColor;transition:transform .3s}
.thumb-panel.collapsed + .book-area .thumb-toggle-outer svg{transform:rotate(180deg)}
.thumb-item{cursor:pointer;margin-bottom:6px;border:2px solid transparent;border-radius:4px;
  overflow:hidden;transition:all .2s;position:relative}
.thumb-item:hover{border-color:rgba(88,166,255,.5);transform:scale(1.03)}
.thumb-item.active{border-color:#58a6ff;box-shadow:0 0 8px rgba(88,166,255,.3)}
.thumb-item img{width:100%;display:block}
.thumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);
  color:#ccc;font-size:10px;text-align:center;padding:2px}

/* 翻书区域 */
.book-area{flex:1;display:flex;justify-content:center;align-items:center;position:relative;overflow:hidden}

/* 左右翻页按钮（页面两侧） */
.flip-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:44px;height:80px;
  background:rgba(13,17,23,.5);border:1px solid rgba(88,166,255,.15);border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);
  transition:all .25s;backdrop-filter:blur(4px)}
.flip-btn:hover{background:rgba(88,166,255,.15);border-color:rgba(88,166,255,.4);color:#58a6ff}
.flip-btn:disabled{opacity:0;pointer-events:none}
.flip-btn svg{width:28px;height:28px;fill:currentColor}
.flip-btn.left{left:16px}
.flip-btn.right{right:16px}

/* 面板收起按钮（在book-area内） */
.thumb-toggle-outer{position:absolute;top:50%;left:0;transform:translateY(-50%);z-index:18;
  width:16px;height:48px;background:rgba(13,17,23,.9);border:1px solid rgba(88,166,255,.2);
  border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#8b949e;transition:all .2s}
.thumb-toggle-outer:hover{background:rgba(88,166,255,.15);color:#58a6ff}
.thumb-toggle-outer svg{width:12px;height:12px;fill:currentColor;transition:transform .3s}

/* StPageFlip 容器 */
.book-container{position:relative}

/* 书脊阴影 */
.book-container::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:16px;height:100%;background:linear-gradient(to right,
    rgba(0,0,0,.0) 0%,rgba(0,0,0,.15) 30%,rgba(0,0,0,.25) 50%,rgba(0,0,0,.15) 70%,rgba(0,0,0,0) 100%);
  pointer-events:none;z-index:5}

/* 桌面阴影 */
.book-shadow{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
  width:80%;height:30px;background:radial-gradient(ellipse,rgba(0,0,0,.35) 0%,transparent 70%);
  pointer-events:none;filter:blur(8px)}

/* 页面样式 */
.page-wrap{background:#fff;overflow:hidden}
.page-content{width:100%;height:100%;display:flex;justify-content:center;align-items:center;
  background:#fffef9;position:relative}
.page-content canvas{display:block}
.page-content.blank{background:linear-gradient(135deg,#faf8f2 0%,#f0ece0 100%)}
.page-content .page-num{position:absolute;bottom:8px;font-size:10px;color:#bbb}
.page-content .page-num.left{left:16px}
.page-content .page-num.right{right:16px}

/* 封面/封底特殊样式 */
.page-content.cover{background:linear-gradient(145deg,#2c3e50 0%,#1a252f 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;color:#e6edf3;padding:32px}
.page-content.cover .cover-logo{max-width:45%;max-height:35%;object-fit:contain;margin-bottom:20px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.page-content.cover .cover-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:12px;
  text-shadow:0 2px 8px rgba(0,0,0,.3)}
.page-content.cover .cover-sub{font-size:13px;color:#8b949e;text-align:center}
.page-content.cover .cover-line{width:60px;height:2px;background:rgba(88,166,255,.5);margin:16px auto;border-radius:1px}

/* 加载遮罩 */
#loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#2a1f3d 0%,#0f0c18 100%)}
#loading.done{opacity:0;pointer-events:none;transition:opacity .5s}
.ld-spinner{width:44px;height:44px;border:3px solid rgba(88,166,255,.2);border-top-color:#58a6ff;
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{color:#79c0ff;font-size:14px}
.ld-sub{color:#8b949e;font-size:12px;margin-top:6px}
.ld-bar{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:12px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,#58a6ff,#79c0ff);border-radius:2px;width:0%;transition:width .3s}

/* 底部提示 */
.hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.25);font-size:11px;pointer-events:none;transition:opacity 1s}
.hint.hide{opacity:0}
</style>
</head>
<body>

<div class="viewer-wrap">
  <div class="top-bar">
    <span class="title" id="docTitle">四普档案</span>
    <div class="center-group">
      <span class="page-info" id="pageInfo">- / -</span>
    </div>
    <div class="right-group">
      <button class="tb" onclick="toggleThumbs()" title="缩略图面板">
        <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
      </button>
    </div>
  </div>

  <div class="main-area">
    <div class="thumb-panel" id="thumbPanel"></div>
    <div class="book-area" id="bookArea">
      <div class="thumb-toggle-outer" onclick="toggleThumbs()" title="展开/收起缩略图">
        <svg viewBox="0 0 24 24" id="toggleIcon"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </div>
      <button class="flip-btn left" id="btnPrev" onclick="flipPrev()" title="上一页">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <div class="book-shadow"></div>
      <div class="book-container" id="bookContainer"></div>
      <button class="flip-btn right" id="btnNext" onclick="flipNext()" title="下一页">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="hint" id="hint">拖拽页角翻页 / 键盘 ← → 翻页</div>

<div id="loading">
  <div class="ld-spinner"></div>
  <div class="ld-text">正在加载档案...</div>
  <div class="ld-sub" id="loadSub"></div>
  <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const pdfUrl = params.get('url') || '';
const docName = decodeURIComponent(params.get('name') || '四普档案');
document.getElementById('docTitle').textContent = docName;

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null;
let totalPages = 0;
let pageFlip = null;
let thumbsOpen = true;
let pageImages = [];

function calcBookSize() {
  const area = document.getElementById('bookArea');
  const aH = area.clientHeight - 40;
  const aW = area.clientWidth - 140;
  const pw = Math.min(Math.floor(aW / 2), 560);
  const ph = Math.min(Math.floor(pw * 1.414), aH);
  return { w: pw, h: ph };
}

async function renderPageToImage(pageNum, w, h) {
  const page = await pdfDoc.getPage(pageNum);
  const vp0 = page.getViewport({ scale: 1 });
  const dpr = window.devicePixelRatio || 1;
  const s = Math.min(w / vp0.width, h / vp0.height);
  const viewport = page.getViewport({ scale: s * dpr });

  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fffef9';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport }).promise;
  return canvas.toDataURL('image/jpeg', 0.92);
}

function createPageElement(imgSrc, pageNum, totalPages, side) {
  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  const content = document.createElement('div');
  content.className = 'page-content';

  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.objectFit = 'contain';
    content.appendChild(img);
  } else {
    content.classList.add('blank');
  }

  if (pageNum > 0) {
    const num = document.createElement('div');
    num.className = 'page-num ' + side;
    num.textContent = pageNum;
    content.appendChild(num);
  }

  wrap.appendChild(content);
  return wrap;
}

function createCoverPage(title, subtitle, isBack) {
  const wrap = document.createElement('div');
  wrap.className = 'page-wrap';
  const content = document.createElement('div');
  content.className = 'page-content cover';

  let html = '';
  if (!isBack) {
    html += '<img class="cover-logo" src="/static/中国遗产保护logo.png" onerror="this.style.display=\'none\'">';
  }
  if (title) html += '<div class="cover-title">' + title + '</div>';
  html += '<div class="cover-line"></div>';
  if (subtitle) html += '<div class="cover-sub">' + subtitle + '</div>';
  content.innerHTML = html;
  wrap.appendChild(content);
  return wrap;
}

async function init() {
  if (!pdfUrl) {
    document.getElementById('loadSub').textContent = '未指定 PDF 文件';
    return;
  }

  try {
    document.getElementById('loadSub').textContent = '正在解析文档...';
    pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
    totalPages = pdfDoc.numPages;

    const { w, h } = calcBookSize();
    const fill = document.getElementById('ldFill');

    document.getElementById('loadSub').textContent = `正在加载 ${totalPages} 页...`;

    for (let i = 1; i <= totalPages; i++) {
      const imgData = await renderPageToImage(i, w, h);
      pageImages.push(imgData);
      fill.style.width = Math.round((i / totalPages) * 100) + '%';
      if (i % 5 === 0 || i === totalPages) {
        document.getElementById('loadSub').textContent = `正在加载 ${i} / ${totalPages} 页...`;
      }
    }

    buildBook(w, h);
    document.getElementById('loading').classList.add('done');
    updateUI();
    generateThumbnails();
    setTimeout(() => document.getElementById('hint').classList.add('hide'), 4000);

  } catch (e) {
    document.getElementById('loadSub').textContent = '加载失败: ' + e.message;
  }
}

function buildBook(pw, ph) {
  const container = document.getElementById('bookContainer');
  container.innerHTML = '';
  container.style.width = (pw * 2) + 'px';
  container.style.height = ph + 'px';

  pageFlip = new St.PageFlip(container, {
    width: pw,
    height: ph,
    size: 'fixed',
    minWidth: pw,
    minHeight: ph,
    maxWidth: pw,
    maxHeight: ph,
    showCover: true,
    maxShadowOpacity: 0.6,
    mobileScrollSupport: false,
    flippingTime: 800,
    usePortrait: false,
    startZIndex: 0,
    autoSize: false,
    drawShadow: true,
    startPage: 0,
    useMouseEvents: true,
    swipeDistance: 30,
    showPageCorners: true,
  });

  const pages = [];
  pages.push(createCoverPage(docName, (window.__PLATFORM_CONFIG && window.__PLATFORM_CONFIG.project && window.__PLATFORM_CONFIG.project.full_name) || '', false));

  for (let i = 0; i < pageImages.length; i++) {
    const side = (pages.length % 2 === 0) ? 'left' : 'right';
    pages.push(createPageElement(pageImages[i], i + 1, totalPages, side));
  }

  if (pageImages.length % 2 === 1) {
    pages.push(createPageElement(null, 0, totalPages, 'left'));
  }

  pages.push(createCoverPage('', '— 档案结束 —', true));

  pageFlip.loadFromHTML(pages);
  pageFlip.on('flip', () => updateUI());
}

function flipNext() {
  if (pageFlip) pageFlip.flipNext('bottom');
}

function flipPrev() {
  if (pageFlip) pageFlip.flipPrev('bottom');
}

function goToPage(pageNum) {
  if (pageFlip) pageFlip.flip(pageNum);
}

function updateUI() {
  if (!pageFlip) return;
  const cur = pageFlip.getCurrentPageIndex();
  const total = pageFlip.getPageCount();

  const leftPage = cur;
  const rightPage = Math.min(cur + 1, total - 1);

  let text;
  if (leftPage === 0) text = '封面';
  else if (rightPage === total - 1 && leftPage === total - 1) text = '封底';
  else {
    const lp = leftPage;
    const rp = rightPage < total - 1 ? rightPage : leftPage;
    text = lp + ' / ' + (total - 2) + ' 页';
    if (lp !== rp) text = lp + '-' + rp + ' / ' + (total - 2) + ' 页';
  }

  document.getElementById('pageInfo').textContent = text;
  document.getElementById('btnPrev').disabled = cur <= 0;
  document.getElementById('btnNext').disabled = cur >= total - 2;

  document.querySelectorAll('.thumb-item').forEach((el) => {
    const idx = parseInt(el.dataset.page);
    el.classList.toggle('active', idx === leftPage || idx === rightPage);
  });

  const activeThumb = document.querySelector('.thumb-item.active');
  if (activeThumb && thumbsOpen) {
    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function toggleThumbs() {
  thumbsOpen = !thumbsOpen;
  document.getElementById('thumbPanel').classList.toggle('collapsed', !thumbsOpen);
  const icon = document.getElementById('toggleIcon');
  if (thumbsOpen) {
    icon.innerHTML = '<path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>';
  } else {
    icon.innerHTML = '<path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>';
  }
  setTimeout(() => {
    if (!pdfDoc || !pageImages.length) return;
    const { w, h } = calcBookSize();
    buildBook(w, h);
    updateUI();
  }, 350);
}

async function generateThumbnails() {
  const panel = document.getElementById('thumbPanel');
  panel.innerHTML = '';

  const coverItem = document.createElement('div');
  coverItem.className = 'thumb-item';
  coverItem.dataset.page = '0';
  coverItem.onclick = () => goToPage(0);
  coverItem.innerHTML = '<div style="background:linear-gradient(145deg,#2c3e50,#1a252f);' +
    'aspect-ratio:1/1.414;display:flex;align-items:center;justify-content:center;' +
    'color:#8b949e;font-size:9px">封面</div>';
  const lbl0 = document.createElement('div');
  lbl0.className = 'thumb-label';
  lbl0.textContent = '封面';
  coverItem.appendChild(lbl0);
  panel.appendChild(coverItem);

  for (let i = 0; i < pageImages.length; i++) {
    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.dataset.page = String(i + 1);
    item.onclick = ((idx) => () => goToPage(idx + 1))(i);
    const img = document.createElement('img');
    img.src = pageImages[i];
    item.appendChild(img);
    const lbl = document.createElement('div');
    lbl.className = 'thumb-label';
    lbl.textContent = i + 1;
    item.appendChild(lbl);
    panel.appendChild(item);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown') flipNext();
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') flipPrev();
  else if (e.key === 'Home') goToPage(0);
  else if (e.key === 'End') goToPage(pageFlip ? pageFlip.getPageCount() - 1 : 0);
});

window.addEventListener('resize', () => {
  if (!pdfDoc || !pageImages.length) return;
  const { w, h } = calcBookSize();
  buildBook(w, h);
  updateUI();
});

init();
</script>
</body>
</html>
