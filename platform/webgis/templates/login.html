<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ full_name }} — 登录</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif;
    background:radial-gradient(ellipse at center,#1a2332 0%,#0d1117 100%);
    color:#c9d1d9;
  }
  .login-card{
    width:380px;padding:48px 36px;
    background:rgba(22,27,34,.85);
    border:1px solid rgba(88,166,255,.18);
    border-radius:16px;
    backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,.45);
    text-align:center;
  }
  .logo{height:64px;margin-bottom:18px;object-fit:contain}
  .title{font-size:20px;font-weight:700;color:#e6edf3;margin-bottom:6px}
  .subtitle{font-size:13px;color:#8b949e;margin-bottom:32px}
  .field{position:relative;margin-bottom:20px;text-align:left}
  .field label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px}
  .field input{
    width:100%;padding:10px 14px;font-size:14px;color:#e6edf3;
    background:#0d1117;border:1px solid #30363d;border-radius:8px;
    outline:none;transition:border-color .2s;
  }
  .field input:focus{border-color:#58a6ff}
  .field input::placeholder{color:#484f58}
  .btn{
    width:100%;padding:11px 0;margin-top:8px;font-size:15px;font-weight:600;
    color:#fff;background:linear-gradient(135deg,#388bfd,#58a6ff);
    border:none;border-radius:8px;cursor:pointer;
    transition:opacity .2s,transform .15s;
  }
  .btn:hover{opacity:.9;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .error-msg{
    margin-top:16px;font-size:13px;color:#f85149;
    min-height:20px;transition:opacity .3s;
  }
  .footer{margin-top:28px;font-size:11px;color:#484f58}
</style>
</head>
<body>
<div class="login-card">
  <img class="logo" src="/static/中国遗产保护logo.png" alt="logo"
       onerror="this.style.display='none'">
  <div class="title">{{ full_name }}</div>
  <div class="subtitle">Jiaxiang Immovable Cultural Relics Digital Archive</div>

  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" placeholder="请输入用户名" required autofocus>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" placeholder="请输入密码" required>
    </div>
    <button class="btn" type="submit">登 录</button>
  </form>

  <div class="error-msg" id="errorMsg"></div>
  <div class="footer">© {{ county_name }}</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('.btn');
  const errEl = document.getElementById('errorMsg');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '登录中…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json().catch(() => ({}));
      errEl.textContent = data.detail || '用户名或密码错误';
    }
  } catch {
    errEl.textContent = '网络错误，请稍后重试';
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
});
</script>
</body>
</html>
