# ============================================================
# 文物保护利用平台 —— 项目配置
# 首次使用前请复制为 config.yaml 并按实际情况修改。
# 敏感字段（API Key）可写成 "${环境变量名}"，程序启动时自动替换。
# ============================================================

# ── 项目基本信息 ─────────────────────────────────────────────
project:
  # 主体名称（作为所有 UI 与文档中的主体名）
  name: "济宁市"
  # 完整平台标题（浏览器标签、页面头显示用）
  full_name: "济宁市文物保护利用平台"
  # 数据截止日期（可选，仅做展示用）
  data_cutoff: "2026-06-30"
  # 数据来源（可选，页面脚注显示；替换真实数据前请保留"演示"字样）
  data_source: "公开演示数据（非真实档案）"

# ── 数据导入 ─────────────────────────────────────────────────
data_import:
  # 全市四普 Markdown 补充目录。该目录可以同时包含在级与未定级档案；
  # step01 默认只追加 rank=5 的未定级文物，现有在级文保单位仍以主档案为准。
  include_ungraded_markdown: true
  ungraded_markdown_dir: "data/济宁市未清洗数据"
  # 仅用于修复已经人工确认的历史在级基线异常；不要做模糊名称匹配。
  protected_repair_codes:
    - "370831-0463-4"  # 东仲都重修仲都关王庙记
    - "370827-0057"    # 韩氏御碑
    - "370881-0482"    # 石门寺建筑群
  # 原始“市级和县级”合并值按本地公布文件/简介作精确修正。
  protected_repair_level_overrides:
    "370831-0463-4": "县级文物保护单位"
    "370827-0057": "市级文物保护单位"
  # 修复时从旧基线中移除的确知无效编号。
  invalid_protected_baseline_codes:
    - "|"

# ── 地理信息 ─────────────────────────────────────────────────
geo:
  # 地图初始视角中心（经度、纬度、相机高度，单位米）——济宁全市
  center:
    lng: 116.587
    lat: 35.415
    alt: 220000
  # 行政区划外接矩形（离线瓦片范围、DEM 裁剪均基于此）
  bounds:
    west: 115.87
    south: 34.43
    east: 117.60
    north: 36.00
  # 台账坐标的源坐标系（step01 用于统一到 WGS-84）：wgs84 / gcj02 / cgcs2000
  source_crs: "wgs84"

  # 行政边界 Shapefile 的投影（step02 用于反投影到 WGS-84）
  boundaries:
    projection: "none"
    central_meridian: 117.0
    is_gcj02: false

  # ── 坐标系显示与转换 ─────────────────────────────────────
  display_crs: "wgs84"
  gauss_kruger:
    zone_width: 3
    central_meridian: "auto"
    zone_prefix: true
  cgcs2000:
    helmert_params: null

# ── 行政区划 ─────────────────────────────────────────────────
administrative:
  county_name: "济宁市"
  # 11 县市区（资源概览与筛选按此顺序展示）
  counties:
    - "任城区"
    - "兖州区"
    - "曲阜市"
    - "邹城市"
    - "微山县"
    - "鱼台县"
    - "金乡县"
    - "嘉祥县"
    - "汶上县"
    - "泗水县"
    - "梁山县"
  # 全量层县区（该县文物额外提供普查档案 / 三维模型）
  full_tier_county: "嘉祥县"
  # 乡镇列表留空则从数据中自动提取
  townships: []

# ── 功能开关 ─────────────────────────────────────────────────
# auto  = 自动检测对应数据目录是否为空，空则关闭该功能
# true  = 强制开启（缺数据会报错）
# false = 强制关闭
features:
  enable_3d_model: auto       # 三维模型查看器
  enable_ai_chat: true        # AI 知识库问答（需 API Key）

# ── 巡查策略 ─────────────────────────────────────────────────
patrol:
  # 按保存状况的巡查频次（天）——保存越差巡查越勤
  frequency_days:
    差: 30
    较差: 60
    一般: 90
    较好: 180
    好: 180
  # 打卡定位核验半径（米）：照片定位与文物坐标距离 <= 该值判定"到场"
  verify_radius_m: 200
  # 超出核验半径但在此范围内标记"待人工复核"
  suspect_radius_m: 500

# ── 外部 API ─────────────────────────────────────────────────
api:
  # SiliconFlow 大模型（AI 问答 / 巡查意图解析 / 照片评估 / 报告生成）
  siliconflow:
    key: "${SILICONFLOW_KEY}"
    base_url: "https://api.siliconflow.cn/v1"
    default_model: "deepseek-ai/DeepSeek-V3.2"
    # 视觉模型（巡查照片与档案基准照对比评估）
    vision_model: "Qwen/Qwen2.5-VL-72B-Instruct"
    available_models:
      - id: "deepseek-ai/DeepSeek-V3.2"
        name: "DeepSeek V3.2"
      - id: "zai-org/GLM-5.1-Pro"
        name: "GLM 5.1 Pro"
      - id: "moonshotai/Kimi-K2.5"
        name: "Kimi K2.5"
    top_k_relics: 8
    history_turns: 10
    temperature: 0.2
    # step00 档案提取(docx→Markdown)的并发请求数,1-8;账号限流严可调低
    extract_concurrency: 2

  # DeepSeek 官方 API（可选,档案提取第二通道: https://platform.deepseek.com/）
  # 配置后可在系统管理页启用"双通道提取":SiliconFlow 正序 + DeepSeek 倒序
  # 同时跑,两边各自断点续传,中间会合,提取速度约翻倍
  deepseek:
    key: "${DEEPSEEK_KEY}"
    base_url: "https://api.deepseek.com/v1"
    default_model: "deepseek-chat"
    extract_concurrency: 2

  # 高德开放平台（巡查路线规划,免费申请: https://lbs.amap.com/）
  # 类型选"Web服务";未配置时路线降级为直线连接,导航跳转不受影响
  amap:
    web_key: "${AMAP_WEB_KEY}"

  # 天地图（国家地理信息公共服务平台,免费申请: https://console.tianditu.gov.cn/）
  # 类型选"服务端";配置后地图页出现"天地图影像/矢量"底图选项
  tianditu:
    key: "${TIANDITU_KEY}"

  # Open-Meteo 天气预报（默认免费接口无需 Key；商用订阅可填写专用地址与 Key）
  weather:
    provider: "Open-Meteo"
    base_url: "https://api.open-meteo.com/v1/forecast"
    key: "${OPEN_METEO_API_KEY}"
    cache_minutes: 15
    stale_hours: 24
    timeout_seconds: 12

  # Cesium Ion（在线高精度地形、可选）
  cesium_ion:
    token: "${CESIUM_ION_TOKEN}"

# ── 服务设置 ─────────────────────────────────────────────────
server:
  host: "0.0.0.0"             # 手机扫码打卡需局域网可达,保持 0.0.0.0
  port: 8000
  # 二维码/移动端使用的对外基地址;留空则自动探测局域网 IP
  # 例: "http://192.168.1.100:8000" 或部署后的域名
  public_base_url: ""
  # 是否启用访问登录，true 时需在下方设置用户（移动端打卡链接始终免登录）
  enable_auth: false
  users:
    - username: "admin"
      password: "changeme"
